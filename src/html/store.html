<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Angel's-NowPlaying Store -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Store - Angel's-NowPlaying</title>
  <!-- Font Awesome (local copy required) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/theme.css" />
  <link rel="stylesheet" href="../css/store.css" />
  <script type="module" src="../js/theme.js"></script>
  <script type="module" src="../js/tauri.js"></script>
</head>
<body>

  <div class="header-container">
    <!-- Left: Mascot/Title -->
    <div class="header-center">
      <img src="../assets/mascot.png" alt="Mascot" class="floating-mascot" />
      <img src="../assets/header-text.png" alt="Header Text" class="header-text" />
    </div>

    <!-- Right Action Buttons -->
    <div class="header-actions">
      <!-- Support Development Row -->
      <div class="button-row">
        <p class="button-row-label">Support Development:</p>
        <a href="https://streamelements.com/angelicadvocate/tip" target="_blank"><button class="action-button tip-button" title="Buy Me a Coffee"><i class="fas fa-heart" style="font-size: 1.2rem;"></i> Buy Me a Coffee</button></a>
      </div>

      <!-- Share this Widget Row -->
      <div class="button-row">
        <p class="button-row-label">Share this widget:</p>
        <a href="#" onclick="shareToTwitter(); return false;"><button class="action-button social-button" title="Share on Twitter"><i class="fab fa-twitter"></i></button></a>
        <a href="#" onclick="shareOnFacebook(); return false;"><button class="action-button social-button" title="Share on Facebook"><i class="fab fa-facebook"></i></button></a>
        <a href="#" onclick="shareToReddit(); return false;"><button class="action-button social-button" title="Share on Reddit"><i class="fab fa-reddit"></i></button></a>
        <a href="#" onclick="shareToDiscord(); return false;"><button class="action-button social-button" title="Share on Discord"><i class="fab fa-discord"></i></button></a>
      </div>
      <div class="button-row">
        <a href="https://github.com/angelicadvocate/Angels-NowPlaying" target="_blank"><button class="action-button" title="GitHub"><i class="fab fa-github"></i> GitHub</button></a>
        <a href="../index.html"><button class="action-button" title="Home"><i class="fas fa-home"></i> Home</button></a>
        <a href="settings.html"><button class="action-button" title="Settings"><i class="fas fa-cog"></i> Settings</button></a>
      </div>
    </div>
  </div>

  <!-- Store Content Placeholder -->
  <div class="store-container">
    <div>
      <img src="/assets/coming-soon.png" alt="Coming Soon" class="coming-soon-img" />
      <div class="coming-soon-text">The Angel's-NowPlaying Store is under development.<br>Check back soon for exclusive overlays and themes!</div>
    </div>
  </div>

  <script>
    // Share helpers + external-link delegation come from tauri.js.

    // ── Store iframe postMessage bridge ───────────────────────────────────
    // Handles two message types posted by the store iframe:
    //   { type: 'install-overlay', downloadUrl, catalogId, overlayName }
    //   { type: 'open-external',   url }

    window.addEventListener('message', async function (e) {
      // Only accept messages from the store iframe.
      const iframe = document.getElementById('store-frame');
      if (iframe && e.source !== iframe.contentWindow) return;

      if (e.data?.type === 'open-external') {
        const url = e.data.url;
        if (typeof url === 'string' && (url.startsWith('https://') || url.startsWith('http://'))) {
          window.openExternalUrl(url);
        }
        return;
      }

      if (e.data?.type === 'install-overlay') {
        const { downloadUrl, catalogId, overlayName } = e.data;
        if (typeof downloadUrl !== 'string' || !downloadUrl.startsWith('https://')) {
          alert('Invalid download URL received from store.');
          return;
        }
        if (typeof catalogId !== 'string' || typeof overlayName !== 'string') {
          alert('Missing overlay metadata received from store.');
          return;
        }

        const confirmed = confirm(
          `Install "${overlayName}" from the store?\n\n` +
          `The overlay will be downloaded and installed automatically.\n\n` +
          `Source: ${downloadUrl}`
        );
        if (!confirmed) return;

        try {
          const installId = await window.__TAURI__.invoke('download_and_install_overlay', {
            url: downloadUrl,
            catalogId,
            overlayName,
          });
          alert(`"${overlayName}" installed successfully! Overlay ID: ${installId}`);
        } catch (err) {
          alert(`Install failed: ${err}`);
        }
        return;
      }
    });
  </script>

</body>
</html>
