<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Horizontal Wide — Editor</title>
  <link rel="stylesheet" href="../../css/editor-header.css" />
  <link rel="stylesheet" href="../../css/editor-common.css" />
  <link rel="stylesheet" href="./editor.css" />
  <script type="module" src="../../js/tauri.js"></script>
</head>
<body>
    <!-- Dynamic header placeholder. Loaded at runtime by header-loader.js -->
    <div id="header-root" data-src="../../html/editor-header.html" data-page-title="Horizontal Wide"></div>

    <main id="site">
      <div class="controls-grid">
        <div class="controls-column">
          <label for="fontFamily" class="info">Font Family</label>
          <select id="fontFamily" class="dropdown">
            <option value="proxima-nova, sans-serif" selected>Proxima Nova</option>
            <option value="Comic Sans MS, cursive">Comic Sans MS</option>
            <option value="Brush Script MT, cursive">Brush Script MT</option>
            <option value="Georgia, serif">Georgia</option>
            <option value="Times New Roman, serif">Times New Roman</option>
            <option value="Courier New, monospace">Courier New</option>
            <option value="Trebuchet MS, sans-serif">Trebuchet MS</option>
            <option value="Verdana, sans-serif">Verdana</option>
          </select>

          <label for="artist_name" class="info">Artist Name Size</label>
          <input type="range" min="8" max="64" value="32" class="slider" id="artist_name">

          <label for="track_title" class="info">Track Title Size</label>
          <input type="range" min="8" max="64" value="48" class="slider" id="track_title">

          <label for="spacing" class="info">Text Vertical Spacing</label>
          <input type="range" min="-8" max="40" value="16" class="slider" id="spacing">
          
          <label for="textVerticalOffset" class="info">Text Vertical Position</label>
          <input type="range" min="-60" max="60" value="0" class="slider" id="textVerticalOffset">

          <label for="contentPadding" class="info">Text Left Padding</label>
          <input type="range" min="0" max="100" value="30" class="slider" id="contentPadding">
        </div>

        <div class="controls-column">
          <label for="color" class="info">Accent Color</label>
          <div class="color-picker-container">
            <input type="color" id="color" class="color-picker" value="#eb3b4b">
            <div id="colorDisplay" class="color-code-overlay"><code id="colorCode">#EB3B4B</code></div>
          </div>
          <label class="info" for="imageSize">Album Art Size</label>
          <input type="range" min="40" max="350" value="140" class="slider" id="imageSize">

          <label for="imageVerticalPosition" class="info">Image Vertical Position</label>
          <input type="range" min="-170" max="170" value="0" class="slider" id="imageVerticalPosition">

          <label for="progressBarOffset" class="info">Progress Bar Vertical Position</label>
          <input type="range" min="-40" max="30" value="0" class="slider" id="progressBarOffset">

          <label for="imagePadding" class="info">Image Left Padding</label>
          <input type="range" min="-200" max="120" value="60" class="slider" id="imagePadding">

          <label for="trackColor" class="info">Track Title Color</label>
          <div class="color-picker-container">
            <input type="color" id="trackColor" class="color-picker" value="#FFFFFF">
            <div id="trackColorDisplay" class="color-code-overlay">
              <code id="trackColorCode">#FFFFFF</code>
            </div>
          </div>
        </div>
      </div>

    <!-- Live preview: main.html loaded in ?edit=1 mode so it skips Tuna polling
         and listens for postMessage CSS variable updates from this editor. -->
    <section id="sample">
      <iframe id="preview-frame" src="./main.html?edit=1" scrolling="no" title="Overlay preview"></iframe>
    </section>
  </main>

  <script>
    // --- Slider/control references ---
    const sliderArtistSize      = document.getElementById('artist_name');
    const sliderSongSize        = document.getElementById('track_title');
    const sliderSpacing         = document.getElementById('spacing');
    const sliderContentPadding  = document.getElementById('contentPadding');
    const sliderTextOffset      = document.getElementById('textVerticalOffset');
    const sliderImageSize       = document.getElementById('imageSize');
    const sliderImagePadding    = document.getElementById('imagePadding');
    const sliderImageVertical   = document.getElementById('imageVerticalPosition');
    const sliderProgressOffset  = document.getElementById('progressBarOffset');
    const pickerAccent          = document.getElementById('color');
    const pickerSongColor       = document.getElementById('trackColor');
    const selectFont            = document.getElementById('fontFamily');
    const codeAccent            = document.getElementById('colorCode');
    const codeSongColor         = document.getElementById('trackColorCode');
    const previewFrame          = document.getElementById('preview-frame');

    // Map: slider/picker element → [CSS var name, unit suffix]
    const CONTROLS = [
      [sliderArtistSize,     '--artist-size',          'px'],
      [sliderSongSize,       '--song-size',             'px'],
      [sliderSpacing,        '--text-spacing',          'px'],
      [sliderContentPadding, '--content-padding-left',  'px'],
      [sliderTextOffset,     '--text-vertical-offset',  'px'],
      [sliderImageSize,      '--image-size',            'px'],
      [sliderImagePadding,   '--image-padding',         'px'],
      [sliderImageVertical,  '--image-vertical',        'px'],
      [sliderProgressOffset, '--progress-bar-offset',   'px'],
      [pickerAccent,         '--accent-hex',            ''],
      [pickerSongColor,      '--song-color',            ''],
    ];

    // --- Send a CSS variable update to the preview iframe ---
    function sendVar(name, value) {
      if (previewFrame && previewFrame.contentWindow) {
        previewFrame.contentWindow.postMessage({ type: 'setCSSVar', name, value }, '*');
      }
    }

    // Accent color also drives --highlight and --artist-color as an HSL value.
    function hexToHsl(hex) {
      const r = parseInt(hex.slice(1,3),16)/255;
      const g = parseInt(hex.slice(3,5),16)/255;
      const b = parseInt(hex.slice(5,7),16)/255;
      const max = Math.max(r,g,b), min = Math.min(r,g,b);
      let h=0, s=0, l=(max+min)/2;
      if (max !== min) {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = (g - b) / d + (g < b ? 6 : 0); break;
          case g: h = (b - r) / d + 2; break;
          case b: h = (r - g) / d + 4; break;
        }
        h = Math.round(h * 60);
        s = Math.round(s * 100);
        l = Math.round(l * 100);
      } else { h = 0; s = 0; l = Math.round(l * 100); }
      return [h, s, l];
    }

    function applyAccentColor(hex) {
      const [h, s, l] = hexToHsl(hex);
      const hsl = `hsl(${h}, ${s}%, ${l}%)`;
      sendVar('--highlight',     hsl);
      sendVar('--artist-color',  hsl);
      sendVar('--accent-hex',    hex);
      codeAccent.textContent = hex.toUpperCase();
    }

    // --- Wire up all controls ---
    CONTROLS.forEach(([el, cssVar, unit]) => {
      el.addEventListener('input', () => {
        if (el === pickerAccent) {
          applyAccentColor(el.value);
        } else if (el === pickerSongColor) {
          codeSongColor.textContent = el.value.toUpperCase();
          sendVar(cssVar, el.value + unit);
        } else {
          sendVar(cssVar, el.value + unit);
        }
      });
    });

    selectFont.addEventListener('change', () => {
      sendVar('--font-main', selectFont.value);
    });

    function populateSlidersFromVars(vars) {
      function px(name, fallback) {
        const v = vars[name] || '';
        const m = v.match(/(-?\d+\.?\d*)/);
        return m ? parseFloat(m[1]) : fallback;
      }
      function hex(name, fallback) { return vars[name] || fallback; }
      function fontVal(name, fallback) { return vars[name] || fallback; }

      sliderArtistSize.value     = px('--artist-size', 32);
      sliderSongSize.value       = px('--song-size', 48);
      sliderSpacing.value        = px('--text-spacing', 16);
      sliderContentPadding.value = px('--content-padding-left', 30);
      sliderTextOffset.value     = px('--text-vertical-offset', 0);
      sliderImageSize.value      = px('--image-size', 140);
      sliderImagePadding.value   = px('--image-padding', 60);
      sliderImageVertical.value  = px('--image-vertical', 0);
      sliderProgressOffset.value = px('--progress-bar-offset', 0);

      const accentHex = hex('--accent-hex', '#eb3b4b');
      pickerAccent.value = accentHex;
      codeAccent.textContent = accentHex.toUpperCase();

      const songHex = hex('--song-color', '#ffffff');
      pickerSongColor.value = songHex.startsWith('#') ? songHex : '#ffffff';
      codeSongColor.textContent = pickerSongColor.value.toUpperCase();

      const font = fontVal('--font-main', 'proxima-nova, sans-serif');
      const opt = Array.from(selectFont.options).find(o => o.value === font);
      if (opt) selectFont.value = font;
    }

    function sendAllVars() {
      CONTROLS.forEach(([el, cssVar, unit]) => {
        if (el === pickerAccent) {
          applyAccentColor(el.value);
        } else {
          sendVar(cssVar, el.value + unit);
        }
      });
      sendVar('--font-main', selectFont.value);
    }

    document.addEventListener('headerLoaded', e => {
      if (e.detail && e.detail.cssVars) populateSlidersFromVars(e.detail.cssVars);
      previewFrame.addEventListener('load', sendAllVars, { once: true });
      setTimeout(sendAllVars, 800);
    });

    // --- Build updated :root block from current slider/picker values ---
    window.buildRootBlock = function buildRootBlock(vars) {
      const [h, s, l] = hexToHsl(pickerAccent.value);
      const hsl = `hsl(${h}, ${s}%, ${l}%)`;
      return `:root {
  /* --- Colors --- */
  --highlight: ${hsl};
  --artist-color: ${hsl};
  --song-color: ${pickerSongColor.value};
  --accent-hex: ${pickerAccent.value};

  /* --- Typography --- */
  --font-main: ${selectFont.value};
  --artist-size: ${sliderArtistSize.value}px;
  --song-size: ${sliderSongSize.value}px;
  --text-spacing: ${sliderSpacing.value}px;

  /* --- Layout --- */
  --image-size: ${sliderImageSize.value}px;
  --image-padding: ${sliderImagePadding.value}px;
  --image-vertical: ${sliderImageVertical.value}px;
  --content-padding-left: ${sliderContentPadding.value}px;
  --text-vertical-offset: ${sliderTextOffset.value}px;
  --progress-bar-offset: ${sliderProgressOffset.value}px;

  /* --- Scroller tuning (read by common.js) --- */
  --scroll-extra: ${vars['--scroll-extra'] || '0px'};
  --scroll-start-offset: ${vars['--scroll-start-offset'] || '30px'};
}`;
    }


  </script>

  <script type="module" src="../../js/editor-header-loader.js"></script>
</body>
</html>
