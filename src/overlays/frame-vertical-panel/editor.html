<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vertical Panel — Editor</title>
  <link rel="stylesheet" href="../../css/editor-common.css" />
  <link rel="stylesheet" href="../../fonts/fonts.css" />
  <script src="../../fonts/font-augment.js" defer></script>
  <link rel="stylesheet" href="./editor.css" />
</head>
<body>
  <main id="site">
    <div id="controls">
      <!-- Left controls column -->
      <div class="controls-column">
        <label for="fontFamily" class="info">Font Family</label>
        <select id="fontFamily" class="dropdown">
        <option value="'Arimo Regular'">Arimo Regular</option>
        <option value="'Arimo Bold'">Arimo Bold</option>
        <option value="'Comic Relief Regular'">Comic Relief Regular</option>
        <option value="'Comic Relief Bold'">Comic Relief Bold</option>
        <option value="'Courier Prime Regular'">Courier Prime Regular</option>
        <option value="'Courier Prime Bold'">Courier Prime Bold</option>
        <option value="'Fascinate Inline Regular'">Fascinate Inline Regular</option>
        <option value="'Gelasio Regular'">Gelasio Regular</option>
        <option value="'Gelasio Bold'">Gelasio Bold</option>
        <option value="'Mogra Regular'">Mogra Regular</option>
        <option value="'Montserrat Regular'" selected>Montserrat Regular</option>
        <option value="'Montserrat Bold'">Montserrat Bold</option>
        <option value="'Playwrite Norge Regular'">Playwrite Norge Regular</option>
        <option value="'Sekuya Regular'">Sekuya Regular</option>
        <option value="'Tinos Regular'">Tinos Regular</option>
        <option value="'Tinos Bold'">Tinos Bold</option>
      
        </select>

        <label for="artist_name" class="info">Artist Name Size</label>
        <input type="range" min="8" max="64" value="24" class="slider" id="artist_name">

        <label for="track_title" class="info">Track Title Size</label>
        <input type="range" min="8" max="64" value="40" class="slider" id="track_title">

        <label for="spacing" class="info">Text Vertical Spacing</label>
        <input type="range" min="-8" max="20" value="8" class="slider" id="spacing">

        <label for="textMarginTop" class="info">Text Vertical Position</label>
        <input type="range" min="-100" max="150" value="25" class="slider" id="textMarginTop">

        <label for="textAlignment" class="info">Text Alignment</label>
        <select id="textAlignment" class="dropdown">
          <option value="left">Left</option>
          <option value="center" selected>Center</option>
          <option value="right">Right</option>
        </select>
      </div>

      <!-- Right controls column -->
      <div class="controls-column">
        <label for="color" class="info">Accent Color</label>
        <div class="color-picker-container">
          <input type="color" id="color" class="color-picker" value="#29a9ff">
          <div id="colorDisplay" class="color-code-overlay"><code id="colorCode">#29A9FF</code></div>
        </div>

        <label for="trackColor" class="info">Track Title Color</label>
        <div class="color-picker-container">
          <input type="color" id="trackColor" class="color-picker" value="#ffffff">
          <div id="trackColorDisplay" class="color-code-overlay"><code id="trackColorCode">#FFFFFF</code></div>
        </div>

        <label for="imageSize" class="info">Album Art Size</label>
        <input type="range" min="100" max="510" value="340" class="slider" id="imageSize">

        <label for="imageMarginTop" class="info">Image Top Margin</label>
        <input type="range" min="-100" max="150" value="76" class="slider" id="imageMarginTop">

        <label for="imagePadding" class="info">Image Left Offset</label>
        <input type="range" min="-150" max="150" value="0" class="slider" id="imagePadding">

        <label for="imageBorderRadius" class="info">Image Border Radius (%)</label>
        <input type="range" min="0" max="50" value="6" class="slider" id="imageBorderRadius">
      </div>
    </div>

    <section id="sample">
      <!-- Live preview: main.html loaded in ?edit=1 mode -->
      <iframe id="preview-frame" src="./main.html?edit=1" scrolling="no" title="Overlay preview"></iframe>
    </section>
  </main>

  <script>
    const sliderArtistSize     = document.getElementById('artist_name');
    const sliderSongSize       = document.getElementById('track_title');
    const sliderSpacing        = document.getElementById('spacing');
    const sliderTextMarginTop  = document.getElementById('textMarginTop');
    const sliderImageSize      = document.getElementById('imageSize');
    const sliderImageMarginTop = document.getElementById('imageMarginTop');
    const sliderImageMarginLeft= document.getElementById('imagePadding');
    const sliderBorderRadius   = document.getElementById('imageBorderRadius');
    const pickerAccent         = document.getElementById('color');
    const pickerSongColor      = document.getElementById('trackColor');
    const selectFont           = document.getElementById('fontFamily');
    const selectTextAlign      = document.getElementById('textAlignment');
    const codeAccent           = document.getElementById('colorCode');
    const codeSongColor        = document.getElementById('trackColorCode');
    const previewFrame         = document.getElementById('preview-frame');

    const CONTROLS = [
      [sliderArtistSize,      '--artist-size',        'px'],
      [sliderSongSize,        '--song-size',           'px'],
      [sliderSpacing,         '--text-spacing',        'px'],
      [sliderTextMarginTop,   '--text-margin-top',     'px'],
      [sliderImageSize,       '--image-size',          'px'],
      [sliderImageMarginTop,  '--image-margin-top',    'px'],
      [sliderImageMarginLeft, '--image-margin-left',   'px'],
      [sliderBorderRadius,    '--image-border-radius', '%'],
      [pickerAccent,          '--accent-hex',          ''],
      [pickerSongColor,       '--song-color',          ''],
    ];

    function sendVar(name, value) {
      if (previewFrame && previewFrame.contentWindow) {
        previewFrame.contentWindow.postMessage({ type: 'setCSSVar', name, value }, '*');
      }
    }

    function hexToHsl(hex) {
      const r = parseInt(hex.slice(1,3),16)/255;
      const g = parseInt(hex.slice(3,5),16)/255;
      const b = parseInt(hex.slice(5,7),16)/255;
      const max = Math.max(r,g,b), min = Math.min(r,g,b);
      let h=0, s=0, l=(max+min)/2;
      if (max !== min) {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = (g - b) / d + (g < b ? 6 : 0); break;
          case g: h = (b - r) / d + 2; break;
          case b: h = (r - g) / d + 4; break;
        }
        h = Math.round(h * 60);
        s = Math.round(s * 100);
        l = Math.round(l * 100);
      } else { h = 0; s = 0; l = Math.round(l * 100); }
      return [h, s, l];
    }

    function applyAccentColor(hex) {
      const [h, s, l] = hexToHsl(hex);
      sendVar('--highlight', `hsl(${h}, ${s}%, ${l}%)`);
      sendVar('--accent-hex', hex);
      codeAccent.textContent = hex.toUpperCase();
    }

    CONTROLS.forEach(([el, cssVar, unit]) => {
      el.addEventListener('input', () => {
        if (el === pickerAccent) {
          applyAccentColor(el.value);
        } else if (el === pickerSongColor) {
          codeSongColor.textContent = el.value.toUpperCase();
          sendVar(cssVar, el.value + unit);
        } else {
          sendVar(cssVar, el.value + unit);
        }
      });
    });

    selectFont.addEventListener('change', () => sendVar('--font-main', selectFont.value));
    selectTextAlign.addEventListener('change', () => sendVar('--text-align', selectTextAlign.value));

    function populateSlidersFromVars(vars) {
      function px(name, fallback) {
        const v = vars[name] || '';
        const m = v.match(/(-?\d+\.?\d*)/);
        return m ? parseFloat(m[1]) : fallback;
      }
      function pct(name, fallback) {
        const v = vars[name] || '';
        const m = v.match(/(-?\d+\.?\d*)/);
        return m ? parseFloat(m[1]) : fallback;
      }
      function hex(name, fallback) { return vars[name] || fallback; }

      sliderArtistSize.value      = px('--artist-size', 24);
      sliderSongSize.value        = px('--song-size', 40);
      sliderSpacing.value         = px('--text-spacing', 8);
      sliderTextMarginTop.value   = px('--text-margin-top', 25);
      sliderImageSize.value       = px('--image-size', 340);
      sliderImageMarginTop.value  = px('--image-margin-top', 76);
      sliderImageMarginLeft.value = px('--image-margin-left', 0);
      sliderBorderRadius.value    = pct('--image-border-radius', 6);

      const accentHex = hex('--accent-hex', '#29a9ff');
      pickerAccent.value = accentHex.startsWith('#') ? accentHex : '#29a9ff';
      codeAccent.textContent = pickerAccent.value.toUpperCase();

      const songHex = hex('--song-color', '#ffffff');
      pickerSongColor.value = songHex.startsWith('#') ? songHex : '#ffffff';
      codeSongColor.textContent = pickerSongColor.value.toUpperCase();

      const font = hex('--font-main', 'proxima-nova, sans-serif');
      const fontOpt = Array.from(selectFont.options).find(o => o.value === font);
      if (fontOpt) selectFont.value = font;

      const align = hex('--text-align', 'center');
      const alignOpt = Array.from(selectTextAlign.options).find(o => o.value === align);
      if (alignOpt) selectTextAlign.value = align;
    }

    function sendAllVars() {
      CONTROLS.forEach(([el, cssVar, unit]) => {
        if (el === pickerAccent) applyAccentColor(el.value);
        else sendVar(cssVar, el.value + unit);
      });
      sendVar('--font-main', selectFont.value);
      sendVar('--text-align', selectTextAlign.value);
    }

    // Signal editor-shell that controls are ready before nested video resources load
    window.parent.postMessage({ type: 'frame-ready' }, '*');

    window.addEventListener('message', e => {
      if (e.data.type === 'init') {
        if (e.data.cssVars) populateSlidersFromVars(e.data.cssVars);
        previewFrame.addEventListener('load', sendAllVars, { once: true });
        setTimeout(sendAllVars, 800);
      }
      if (e.data.type === 'reset-to-defaults') {
        populateSlidersFromVars(e.data.defaults || {});
        sendAllVars();
      }
      if (e.data.type === 'request-root-block') {
        const css = window.buildRootBlock(e.data.existingVars || {});
        e.source.postMessage({ type: 'root-block', css }, '*');
      }
    });

    window.buildRootBlock = function buildRootBlock(vars) {
      const [h, s, l] = hexToHsl(pickerAccent.value);
      return `:root {
  /* --- Colors --- */
  --highlight: hsl(${h}, ${s}%, ${l}%);
  --accent-hex: ${pickerAccent.value};
  --song-color: ${pickerSongColor.value};

  /* --- Typography --- */
  --font-main: ${selectFont.value};
  --artist-size: ${sliderArtistSize.value}px;
  --song-size: ${sliderSongSize.value}px;
  --text-spacing: ${sliderSpacing.value}px;
  --text-align: ${selectTextAlign.value};

  /* --- Layout --- */
  --image-size: ${sliderImageSize.value}px;
  --image-margin-top: ${sliderImageMarginTop.value}px;
  --image-margin-left: ${sliderImageMarginLeft.value}px;
  --image-border-radius: ${sliderBorderRadius.value}%;
  --text-margin-top: ${sliderTextMarginTop.value}px;

  /* --- Scroller tuning (read by common.js) --- */
  --scroll-extra: ${vars['--scroll-extra'] || '40px'};
  --scroll-start-offset: ${vars['--scroll-start-offset'] || '40px'};

  /* --- Fixed layout constants (not exposed as editor controls) --- */
  --f3-progress-bottom: ${vars['--f3-progress-bottom'] || '85px'};
  --f3-progress-scale: ${vars['--f3-progress-scale'] || '0.9'};
}`;
    }


  </script>

</body>
</html>
