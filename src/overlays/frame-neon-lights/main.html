<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Neon Lights — Now Playing</title>
	<link rel="stylesheet" href="./main.css" />
	<script src="../../js/vendor/jquery-3.5.1.min.js"></script>
	<script src="./common.js"></script>
	<script>
		document.addEventListener('DOMContentLoaded', () => {
			// Skip auto-rotate when loaded inside the editor iframe — editor drives it via postMessage
			if (window.self !== window.top) return;
			const mode = getComputedStyle(document.documentElement)
				.getPropertyValue('--auto-rotate-mode').trim();
			if (mode === 'no' || !mode) return;
			const baseAccent = getComputedStyle(document.documentElement).getPropertyValue('--accent-hex').trim();
			const hex = baseAccent || '#ff2ed2';
			const toHsl = h => { const r=parseInt(h.slice(1,3),16)/255,g=parseInt(h.slice(3,5),16)/255,b=parseInt(h.slice(5,7),16)/255,max=Math.max(r,g,b),min=Math.min(r,g,b);let hh=0,s=0,l=(max+min)/2;if(max!==min){const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);switch(max){case r:hh=(g-b)/d+(g<b?6:0);break;case g:hh=(b-r)/d+2;break;case b:hh=(r-g)/d+4;break;}hh=Math.round(hh*60);s=Math.round(s*100);l=Math.round(l*100);}else{l=Math.round(l*100);}return[hh,s,l]; };
			const [bh, bs, bl] = toHsl(hex);
			let hue = 313;
			setInterval(() => {
				hue = (hue + 2) % 360;
				const r = document.documentElement;
				r.style.setProperty('--neon-filter', `hue-rotate(${hue}deg)`);
				if (mode === 'frame-accent') {
					const rh = ((bh + hue) % 360 + 360) % 360;
					r.style.setProperty('--highlight', `hsl(${rh}, ${bs}%, ${bl}%)`);
				}
			}, 50);
		});
	</script>
</head>
<body>
	<div id="background">
		<video id="neon-frame" autoplay loop muted playsinline crossorigin="anonymous" preload="auto">
			<source src="./neon-color-frame-main.webm" type="video/webm">
		</video>
		<div id="image-wrapper">
			<img id="image" />
			<video id="neon-album-art-frame" autoplay loop muted playsinline crossorigin="anonymous" preload="auto">
				<source src="./neon-album-art-frame.webm" type="video/webm">
			</video>
		</div>
		<div id="content">
			<div id="text-box">
				<div class="text-box"><span id="artist"></span></div>
				<div class="text-box"><span id="song"></span></div>
			</div>
		</div>
		<div id="progress-container">
			<div id="progress-bar"></div>
		</div>
	</div>
</body>
</html>
