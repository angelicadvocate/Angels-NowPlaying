<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neon Lights — Editor</title>
  <link rel="stylesheet" href="../../css/editor-header.css" />
  <link rel="stylesheet" href="./editor.css" />
  <link rel="stylesheet" href="../../css/editor-common.css" />
  <script type="module" src="../../js/tauri.js"></script>
</head>
<body>
    <!-- Dynamic header placeholder -->
  <div id="header-root"
       data-src="../../html/editor-header.html"
       data-page-title="Neon Lights">
  </div>

  <main id="site">
    <div id="controls">
      <!-- Left column: typography + color -->
      <div class="controls-column">
        <label for="selectFont" class="info">Font Family</label>
        <select id="selectFont" class="dropdown">
          <option value="proxima-nova, sans-serif">Proxima Nova</option>
          <option value="Arial, sans-serif">Arial</option>
          <option value="Georgia, serif">Georgia</option>
          <option value="Trebuchet MS, sans-serif">Trebuchet MS</option>
          <option value="Verdana, sans-serif">Verdana</option>
          <option value="Courier New, monospace">Courier New</option>
          <option value="Comic Sans MS, cursive">Comic Sans MS</option>
        </select>

        <label for="sliderArtistSize" class="info">Artist Name Size</label>
        <input type="range" min="16" max="64" step="1" value="36" class="slider" id="sliderArtistSize">

        <label for="sliderSongSize" class="info">Track Title Size</label>
        <input type="range" min="16" max="72" step="1" value="52" class="slider" id="sliderSongSize">

        <label for="sliderTextSpacing" class="info">Text Vertical Spacing</label>
        <input type="range" min="-8" max="20" step="1" value="2" class="slider" id="sliderTextSpacing">

        <label for="sliderTextOffset" class="info">Text Vertical Position</label>
        <input type="range" min="-100" max="60" step="1" value="-32" class="slider" id="sliderTextOffset">

        <label for="sliderContentPadding" class="info">Content Left Padding</label>
        <input type="range" min="0" max="200" step="1" value="20" class="slider" id="sliderContentPadding">
      </div>

      <!-- Right column: image, layout, neon hue -->
      <div class="controls-column">
        <label for="pickerAccent" class="info">Accent Color</label>
        <div class="color-picker-container">
          <input type="color" id="pickerAccent" class="color-picker" value="#ff2ed2">
          <div class="color-code-overlay"><code id="codeAccent">#FF2ED2</code></div>
        </div>

        <label for="sliderImageSize" class="info">Album Art Size</label>
        <input type="range" min="80" max="300" step="1" value="144" class="slider" id="sliderImageSize">

        <label for="sliderImageMargin" class="info">Image Left Margin</label>
        <input type="range" min="-150" max="300" step="1" value="160" class="slider" id="sliderImageMargin">

        <label for="sliderProgressOffset" class="info">Progress Bar Position</label>
        <input type="range" min="-30" max="60" step="1" value="24" class="slider" id="sliderProgressOffset">

        <label for="sliderFrameHue" class="info">Frame Hue</label>
        <input type="range" min="-180" max="180" step="1" value="0" class="slider" id="sliderFrameHue">

        <label for="selectAutoRotate" class="info">Auto Rotate Hue</label>
        <select id="selectAutoRotate" class="dropdown">
          <option value="no">No (manual)</option>
          <option value="frame-only">Frame Only</option>
          <option value="frame-accent">Frame + Accent</option>
        </select>
      </div>
    </div>

    <!-- Live preview iframe -->
    <section id="sample">
      <iframe id="preview-frame" src="./main.html?edit=1" scrolling="no" title="Overlay preview"></iframe>
    </section>
  </main>

  <script>
    // --- Element references ---
    const selectFont           = document.getElementById('selectFont');
    const sliderArtistSize     = document.getElementById('sliderArtistSize');
    const sliderSongSize       = document.getElementById('sliderSongSize');
    const sliderTextSpacing    = document.getElementById('sliderTextSpacing');
    const sliderTextOffset     = document.getElementById('sliderTextOffset');
    const sliderContentPadding = document.getElementById('sliderContentPadding');
    const pickerAccent         = document.getElementById('pickerAccent');
    const codeAccent           = document.getElementById('codeAccent');
    const sliderImageSize      = document.getElementById('sliderImageSize');
    const sliderImageMargin    = document.getElementById('sliderImageMargin');
    const sliderProgressOffset = document.getElementById('sliderProgressOffset');
    const sliderFrameHue       = document.getElementById('sliderFrameHue');
    const selectAutoRotate     = document.getElementById('selectAutoRotate');
    const previewFrame         = document.getElementById('preview-frame');

    // --- Send a CSS variable to the preview iframe ---
    function sendVar(name, value) {
      if (previewFrame && previewFrame.contentWindow) {
        previewFrame.contentWindow.postMessage({ type: 'setCSSVar', name, value }, '*');
      }
    }

    // --- Hex → HSL conversion ---
    function hexToHsl(hex) {
      const r = parseInt(hex.slice(1,3),16)/255;
      const g = parseInt(hex.slice(3,5),16)/255;
      const b = parseInt(hex.slice(5,7),16)/255;
      const max = Math.max(r,g,b), min = Math.min(r,g,b);
      let h=0, s=0, l=(max+min)/2;
      if (max !== min) {
        const d = max - min;
        s = l > 0.5 ? d/(2-max-min) : d/(max+min);
        switch(max) {
          case r: h = (g-b)/d + (g<b?6:0); break;
          case g: h = (b-r)/d + 2; break;
          case b: h = (r-g)/d + 4; break;
        }
        h = Math.round(h*60);
        s = Math.round(s*100);
        l = Math.round(l*100);
      } else { l = Math.round(l*100); }
      return [h, s, l];
    }

    function applyAccentColor(hex) {
      const [h, s, l] = hexToHsl(hex);
      sendVar('--highlight', `hsl(${h}, ${s}%, ${l}%)`);
      sendVar('--accent-hex', hex);
      codeAccent.textContent = hex.toUpperCase();
    }

    // --- Neon hue filter logic ---
    let autoRotateInterval = null;

    function applyHueFilters(hue, mode) {
      sendVar('--neon-filter', `hue-rotate(${hue}deg)`);
      if (mode === 'frame-accent') {
        const [h, s, l] = hexToHsl(pickerAccent.value);
        const rh = ((h + hue) % 360 + 360) % 360;
        sendVar('--highlight', `hsl(${rh}, ${s}%, ${l}%)`);
      }
    }

    sliderFrameHue.addEventListener('input', () => {
      if (selectAutoRotate.value === 'no') {
        applyHueFilters(parseInt(sliderFrameHue.value), 'no');
      }
    });

    selectAutoRotate.addEventListener('change', () => {
      clearInterval(autoRotateInterval);
      autoRotateInterval = null;
      const mode = selectAutoRotate.value;
      if (mode !== 'no') {
        sliderFrameHue.disabled = true;
        applyAccentColor(pickerAccent.value);
        let hue = 220;
        autoRotateInterval = setInterval(() => {
          hue = (hue + 2) % 360;
          applyHueFilters(hue, mode);
        }, 50);
      } else {
        sliderFrameHue.disabled = false;
        applyHueFilters(parseInt(sliderFrameHue.value), 'no');
        applyAccentColor(pickerAccent.value);
      }
    });

    // --- Standard controls ---
    const CONTROLS = [
      [sliderArtistSize,     '--artist-size',         'px'],
      [sliderSongSize,       '--song-size',            'px'],
      [sliderTextSpacing,    '--text-spacing',         'px'],
      [sliderTextOffset,     '--text-vertical-offset', 'px'],
      [sliderContentPadding, '--content-padding-left', 'px'],
      [sliderImageSize,      '--image-size',           'px'],
      [sliderImageMargin,    '--image-margin-left',    'px'],
      [sliderProgressOffset, '--progress-bar-offset',  'px'],
    ];

    CONTROLS.forEach(([el, cssVar, unit]) => {
      el.addEventListener('input', () => sendVar(cssVar, el.value + unit));
    });

    pickerAccent.addEventListener('input', () => applyAccentColor(pickerAccent.value));
    selectFont.addEventListener('change', () => sendVar('--font-main', selectFont.value));

    // --- Parse :root block from main.css ---
    function parseCSSVars(cssText) {
      const vars = {};
      const m = cssText.match(/:root\s*\{([^}]*)\}/s);
      if (!m) return vars;
      m[1].split('\n').forEach(line => {
        const lm = line.match(/^\s*(--[\w-]+)\s*:\s*(.+?)\s*;/);
        if (lm) vars[lm[1]] = lm[2].trim();
      });
      return vars;
    }

    function populateSlidersFromVars(vars) {
      function px(name, fallback) {
        const v = vars[name] || '';
        const m = v.match(/(-?\d+\.?\d*)/);
        return m ? parseFloat(m[1]) : fallback;
      }
      sliderArtistSize.value     = px('--artist-size', 36);
      sliderSongSize.value       = px('--song-size', 52);
      sliderTextSpacing.value    = px('--text-spacing', 2);
      sliderTextOffset.value     = px('--text-vertical-offset', -32);
      sliderContentPadding.value = px('--content-padding-left', 20);
      sliderImageSize.value      = px('--image-size', 144);
      sliderImageMargin.value    = px('--image-margin-left', 160);
      sliderProgressOffset.value = px('--progress-bar-offset', 24);

      // Restore frame hue from --neon-filter if present
      const nf = vars['--neon-filter'] || 'none';
      const hm = nf.match(/hue-rotate\((-?\d+)/);
      sliderFrameHue.value = hm ? parseInt(hm[1]) : 0;
      const savedMode = vars['--auto-rotate-mode'] || 'no';
      selectAutoRotate.value = savedMode;
      sliderFrameHue.disabled = savedMode !== 'no';
      if (savedMode !== 'no') selectAutoRotate.dispatchEvent(new Event('change'));

      const accentHex = vars['--accent-hex'] || '#ff2ed2';
      pickerAccent.value = accentHex;
      codeAccent.textContent = accentHex.toUpperCase();

      const font = vars['--font-main'] || 'proxima-nova, sans-serif';
      const opt = Array.from(selectFont.options).find(o => o.value === font);
      if (opt) selectFont.value = font;
    }

    function sendAllVars() {
      CONTROLS.forEach(([el, cssVar, unit]) => sendVar(cssVar, el.value + unit));
      applyAccentColor(pickerAccent.value);
      sendVar('--font-main', selectFont.value);
      // Only apply hue filters directly when auto-rotate is off; otherwise the interval handles it
      if (selectAutoRotate.value === 'no') {
        applyHueFilters(parseInt(sliderFrameHue.value));
      }
    }

    const CSS_PATH = 'src/overlays/frame-neon-lights/main.css';

    async function readMainCSS() {
      if (window.tauri && window.tauri.invoke) {
        return window.tauri.invoke('read_text_file', { path: CSS_PATH });
      }
      return fetch('./main.css?raw').then(r => r.text()).catch(() => '');
    }

    readMainCSS()
      .then(css => { if (css) populateSlidersFromVars(parseCSSVars(css)); })
      .catch(() => {})
      .finally(() => {
        previewFrame.addEventListener('load', sendAllVars, { once: true });
        setTimeout(sendAllVars, 800);
      });

    // --- Build :root block for saving ---
    function buildRootBlock(vars) {
      const [h, s, l] = hexToHsl(pickerAccent.value);
      const hsl = `hsl(${h}, ${s}%, ${l}%)`;
      const hue = parseInt(sliderFrameHue.value);
      const neonFilter = (selectAutoRotate.value === 'no')
        ? `hue-rotate(${hue}deg)`
        : 'none';
      return `:root {
  /* --- Colors --- */
  --highlight: ${hsl};
  --accent-hex: ${pickerAccent.value};

  /* --- Typography --- */
  --font-main: ${selectFont.value};
  --artist-size: ${sliderArtistSize.value}px;
  --song-size: ${sliderSongSize.value}px;
  --text-spacing: ${sliderTextSpacing.value}px;

  /* --- Layout --- */
  --image-size: ${sliderImageSize.value}px;
  --image-margin-left: ${sliderImageMargin.value}px;
  --content-padding-left: ${sliderContentPadding.value}px;
  --text-vertical-offset: ${sliderTextOffset.value}px;
  --progress-bar-offset: ${sliderProgressOffset.value}px;

  /* --- Neon filter vars (managed by editor or ?edit=1 postMessage) --- */
  --neon-filter: ${neonFilter};
  --auto-rotate-mode: ${selectAutoRotate.value};

  /* --- Scroller tuning (read by common.js) --- */
  --scroll-extra: ${vars['--scroll-extra'] || '0px'};
  --scroll-start-offset: ${vars['--scroll-start-offset'] || '30px'};
}`;
    }

    // --- Save: rewrite only the :root block in main.css ---
    window.onSave = async function () {
      let existingCSS = '';
      try {
        existingCSS = await readMainCSS();
      } catch (e) {
        alert('Could not read main.css before saving: ' + e);
        return;
      }
      const existingVars = parseCSSVars(existingCSS);
      const newRoot = buildRootBlock(existingVars);
      const updated = existingCSS.replace(/:root\s*\{[^}]*\}/s, newRoot);

      if (window.tauri && window.tauri.invoke) {
        try {
          await window.tauri.invoke('save_css_file', { path: CSS_PATH, content: updated });
          alert('Saved successfully!');
        } catch (e) {
          alert('Failed to save: ' + e);
        }
      } else {
        alert('Tauri API not available. Run inside the app to save.');
      }
    };

    window.onBack = function () { history.back(); };
  </script>

  <script type="module" src="../../js/editor-header-loader.js"></script>
</body>
</html>
