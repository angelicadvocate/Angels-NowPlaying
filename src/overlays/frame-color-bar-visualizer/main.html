<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Color Bar Visualizer — Now Playing</title>
	<link rel="stylesheet" href="./main.css" />
	<script src="../../js/vendor/jquery-3.5.1.min.js"></script>
	<script src="./common.js"></script>
	<script>
		document.addEventListener('DOMContentLoaded', () => {
			if (window.self !== window.top) return;
			const mode = getComputedStyle(document.documentElement).getPropertyValue('--auto-rotate-mode').trim();
			if (mode !== 'yes') return;
			let hue = 0;
			setInterval(() => {
				hue = (hue + 2) % 360;
				document.documentElement.style.setProperty('--frame-hue', `${hue}deg`);
			}, 50);
		});
	</script>
</head>
<body>
	<div id="background">
		<img id="frame-image" src="./Frame10.png" alt="" />
		<video id="visualizer" autoplay loop muted playsinline crossorigin="anonymous" preload="auto">
			<source src="./color-bar-visualizer.webm" type="video/webm">
		</video>
		<div id="image-wrapper">
			<img id="image" />
		</div>
		<div id="content">
			<div id="text-box">
				<div class="text-box"><span id="artist"></span></div>
				<div class="text-box"><span id="song"></span></div>
			</div>
		</div>
		<div id="progress-container">
			<div id="progress-bar"></div>
		</div>
	</div>
</body>
</html>
