<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EditorV2-Frame8-Vinyl</title>
  <link rel="stylesheet" href="../../css/editor_pages/editor-header.css" />
  <link rel="stylesheet" href="./editor.css" />
  <link rel="stylesheet" href="../../css/editor_pages/editor-common.css" />
  <script type="module" src="../../js/tauri.js"></script>
</head>
<body>
    <!-- Dynamic header placeholder -->
    <div id="header-root" data-src="../../editor_pages/editor-header.html" data-page-title="Frame 8 - Retro Vinyl"></div>

    <main id="site">
    <section id="controls">
      <label for="fontFamily" class="info">Font Family</label>
      <select id="fontFamily" class="dropdown">
        <option value="proxima-nova, sans-serif" selected>Proxima Nova</option>
        <option value="Comic Sans MS, cursive">Comic Sans MS</option>
        <option value="Brush Script MT, cursive">Brush Script MT</option>
        <option value="Georgia, serif">Georgia</option>
        <option value="Times New Roman, serif">Times New Roman</option>
        <option value="Courier New, monospace">Courier New</option>
        <option value="Trebuchet MS, sans-serif">Trebuchet MS</option>
        <option value="Verdana, sans-serif">Verdana</option>
      </select>

      <label for="artist_name" class="info">Artist Name Size</label>
      <input type="range" min="12" max="48" value="24" class="slider" id="artist_name"> 

      <label for="track_title" class="info">Track Title Size</label>
      <input type="range" min="16" max="50" value="30" class="slider" id="track_title">  

      <label for="textColor" class="info">Text Color</label>
      <div class="color-picker-container">
        <input type="color" id="textColor" class="color-picker" value="#ffffff">
        <div id="textColorDisplay" class="color-code-overlay"><code id="textColorCode">#FFFFFF</code></div>
      </div>

      <label for="accentColor" class="info">Accent Color</label>
      <div class="color-picker-container">
        <input type="color" id="accentColor" class="color-picker" value="#ff2a2a">
        <div id="accentColorDisplay" class="color-code-overlay"><code id="accentColorCode">#FF2A2A</code></div>
      </div>

      <label for="contentOffset" class="info">Text Vertical Offset</label>
      <input type="range" min="-290" max="290" value="136" class="slider" id="contentOffset">

      <label for="spacing" class="info">Text Vertical Spacing</label>
      <input type="range" min="-8" max="20" value="0" class="slider" id="spacing">
    </section>

    <section id="sample">
      <div id="background">
        <!-- Preview Album Art Background (centered in container) -->
        <div id="album-art-container">
          <img id="image" src="./SampleAlbum.png" alt="Album Art" />
        </div>
        <!-- Vinyl Elements (centered in container) -->
        <div id="vinyl-container">
          <img id="vinyl-record" src="./vinyl_base.png" alt="Vinyl Record" />
        </div>

        <!-- Common Content -->
        <div id="content">
          <div id="text-box">
            <p id="artist">Sample Artist</p>
            <p id="song">Sample Song Title</p>
          </div>
        </div>
      </div>
    </section>
    </main>

  <script>
    // Input elements
    const artistSize = document.getElementById("artist_name");
    const songSize = document.getElementById("track_title");
    const textColor = document.getElementById("textColor");
    const accentColor = document.getElementById("accentColor");
    const contentOffset = document.getElementById("contentOffset");
    const fontFamily = document.getElementById("fontFamily");
    const spacing = document.getElementById("spacing");
    
    // Storage keys
    const STORAGE_KEY = 'F8EditorSettings';
    
    // Load settings from localStorage on page load
    function loadSettings() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const settings = JSON.parse(saved);
        artistSize.value = settings.artistSize || "24";
        songSize.value = settings.songSize || "30";
        textColor.value = settings.textColor || "#ffffff";
        accentColor.value = settings.accentColor || "#ff2a2a";
        contentOffset.value = settings.contentOffset || "136";
        fontFamily.value = settings.fontFamily || "proxima-nova, sans-serif";
        spacing.value = settings.spacing || "8";
        applyPreview();
      }
    }
    
    // Save settings to localStorage
    function saveSettings() {
      const settings = {
        artistSize: artistSize.value,
        songSize: songSize.value,
        textColor: textColor.value,
        accentColor: accentColor.value,
        contentOffset: contentOffset.value,
        fontFamily: fontFamily.value,
        spacing: spacing.value
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
    }
    
    // Apply preview
    function applyPreview() {
      const artist = document.getElementById("artist");
      const song = document.getElementById("song");
      const content = document.getElementById("content");
      
      artist.style.fontSize = artistSize.value + 'px';
      artist.style.color = accentColor.value;
      artist.style.fontFamily = fontFamily.value;
      // Horizontal spacing between artist and song (applies as bottom margin on artist)
      artist.style.marginBottom = (spacing ? spacing.value : 8) + 'px';
      song.style.fontSize = songSize.value + 'px';
      song.style.color = textColor.value;
      song.style.fontFamily = fontFamily.value;
      content.style.transform = `translateY(${contentOffset.value}px)`;

        // update badges
        updateColorBadges();
    }

      // Update hex badges when preview updates
      function updateColorBadges() {
        const t = document.getElementById('textColorCode');
        const a = document.getElementById('accentColorCode');
        if (t) t.textContent = (textColor.value || '').toUpperCase();
        if (a) a.textContent = (accentColor.value || '').toUpperCase();
      }
    
    // Event listeners for live preview
    [artistSize, songSize, textColor, accentColor, contentOffset, fontFamily, spacing].forEach(input => {
      input.addEventListener('input', () => {
        applyPreview();
      });
    });
    
    // Expose page-specific header callbacks for dynamic header
    window.onSave = function() {
      saveSettings();
      alert("Settings saved!");
    };
    window.onBack = function() { history.back(); };
    
    // Load URL parameters if present
    function loadFromURL() {
      const params = new URLSearchParams(window.location.search);
      if (params.has('artistSize')) {
        artistSize.value = params.get('artistSize');
        songSize.value = params.get('songSize');
        textColor.value = '#' + params.get('textColor');
        accentColor.value = '#' + params.get('accentColor');
        contentOffset.value = params.get('contentOffset');
        applyPreview();
      }
    }
    
    // Initialize
    window.addEventListener('DOMContentLoaded', () => {
      loadFromURL();
      if (!window.location.search) {
        loadSettings();
      }
      // Ensure preview is applied on load even when no saved settings or URL params
      applyPreview();
    });
  </script>

  <script type="module" src="../../js/editor-header-loader.js"></script>
</body>
</html>
