<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>F8 Now Playing Vinyl</title>
  <link rel="stylesheet" href="./main.css" />
    <link rel="stylesheet" href="../../fonts/fonts.css" />
  <script src="../../js/vendor/jquery-3.5.1.min.js"></script>
</head>
<body>
  <div id="background">
    <div id="album-art-container" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 0;">
      <img id="image" src="./SampleAlbum.png" alt="Album Art" />
    </div>
    <div id="vinyl-container" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1;">
      <img id="vinyl-record" src="./vinyl_base.png" alt="Vinyl Record" />
    </div>
    <div id="content">
      <div id="text-box">
        <p id="artist"></p>
        <p id="song"></p>
      </div>
    </div>
  </div>
  <script src="../tuna-port.js"></script>
  <script src="./common.js"></script>
</body>
</html>
