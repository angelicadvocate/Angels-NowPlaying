<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Glassmorphism 1 — Editor</title>
  <link rel="stylesheet" href="./editor.css" />
  <link rel="stylesheet" href="../../css/editor-common.css" />
  <link rel="stylesheet" href="../../fonts/fonts.css" />
  <script src="../../fonts/font-augment.js" defer></script>
  </head>
<body>
    <main id="site">
      <div class="controls-grid">
        <div class="controls-column">
          <label for="fontFamily" class="info">Font Family</label>
          <select id="fontFamily" class="dropdown">
        <option value="'Arimo Regular'">Arimo Regular</option>
        <option value="'Arimo Bold'">Arimo Bold</option>
        <option value="'Comic Relief Regular'">Comic Relief Regular</option>
        <option value="'Comic Relief Bold'">Comic Relief Bold</option>
        <option value="'Courier Prime Regular'">Courier Prime Regular</option>
        <option value="'Courier Prime Bold'">Courier Prime Bold</option>
        <option value="'Fascinate Inline Regular'">Fascinate Inline Regular</option>
        <option value="'Gelasio Regular'">Gelasio Regular</option>
        <option value="'Gelasio Bold'">Gelasio Bold</option>
        <option value="'Mogra Regular'">Mogra Regular</option>
        <option value="'Montserrat Regular'" selected>Montserrat Regular</option>
        <option value="'Montserrat Bold'">Montserrat Bold</option>
        <option value="'Playwrite Norge Regular'">Playwrite Norge Regular</option>
        <option value="'Sekuya Regular'">Sekuya Regular</option>
        <option value="'Tinos Regular'">Tinos Regular</option>
        <option value="'Tinos Bold'">Tinos Bold</option>
      
          </select>

          <label for="artist_name" class="info">Artist Name Size</label>
          <input type="range" min="8" max="64" value="16" class="slider" id="artist_name"> 

          <label for="track_title" class="info">Track Title Size</label>
          <input type="range" min="8" max="64" value="24" class="slider" id="track_title">

          <label for="textColor" class="info">Text Color</label>
          <div class="color-picker-container">
            <input type="color" id="textColor" class="color-picker" value="#ffffff">
            <div id="textColorDisplay" class="color-code-overlay">
              <code id="textColorCode">#FFFFFF</code>
            </div>
          </div>

          <label for="spacing" class="info">Text Vertical Spacing</label>
          <input type="range" min="-8" max="20" value="4" class="slider" id="spacing">

          <label for="contentPadding" class="info">Text/Bar Left Padding</label>
          <input type="range" min="0" max="50" value="4" class="slider" id="contentPadding">
        </div>

        <div class="controls-column">
          <label class="info" for="imageSize">Album Art Size</label>
          <input type="range" min="40" max="300" value="125" class="slider" id="imageSize">

          <label for="imagePadding" class="info">Image Left Padding</label>
          <input type="range" min="-150" max="50" value="-30" class="slider" id="imagePadding">

          <label for="imageVerticalPosition" class="info">Image Vertical Position</label>
          <input type="range" min="-60" max="60" value="0" class="slider" id="imageVerticalPosition">

          <label for="textVerticalOffset" class="info">Text Vertical Position</label>
          <input type="range" min="-30" max="30" value="-7" class="slider" id="textVerticalOffset">

          <label for="progressBarOffset" class="info">Progress Bar Vertical Position</label>
          <input type="range" min="-30" max="30" value="-5" class="slider" id="progressBarOffset">

          <label for="progressBarColor" class="info">Progress Bar Color</label>
          <div class="color-picker-container">
            <input type="color" id="progressBarColor" class="color-picker" value="#ffffff">
            <div id="progressBarColorDisplay" class="color-code-overlay">
              <code id="progressBarColorCode">#FFFFFF</code>
            </div>
          </div>
        </div>
      </div>

    <section id="sample">
      <iframe id="preview-frame" src="./main.html?edit=1" scrolling="no" title="Overlay preview"></iframe>
    </section>
  </main>

  <script>
    // --- Element references (keep original IDs) ---
    const fontFamily            = document.getElementById('fontFamily');
    const artist_name           = document.getElementById('artist_name');
    const track_title           = document.getElementById('track_title');
    const textColor             = document.getElementById('textColor');
    const textColorCode         = document.getElementById('textColorCode');
    const spacing               = document.getElementById('spacing');
    const contentPadding        = document.getElementById('contentPadding');
    const imageSize             = document.getElementById('imageSize');
    const imagePadding          = document.getElementById('imagePadding');
    const imageVerticalPosition = document.getElementById('imageVerticalPosition');
    const textVerticalOffset    = document.getElementById('textVerticalOffset');
    const progressBarOffset     = document.getElementById('progressBarOffset');
    const progressBarColor      = document.getElementById('progressBarColor');
    const progressBarColorCode  = document.getElementById('progressBarColorCode');
    const previewFrame          = document.getElementById('preview-frame');

    // --- Send a CSS variable to the preview iframe ---
    function sendVar(name, value) {
      if (previewFrame && previewFrame.contentWindow) {
        previewFrame.contentWindow.postMessage({ type: 'setCSSVar', name, value }, '*');
      }
    }

    // --- Standard slider controls (value → px var) ---
    const CONTROLS = [
      [artist_name,           '--artist-size',          'px'],
      [track_title,           '--song-size',             'px'],
      [spacing,               '--text-spacing',          'px'],
      [imageSize,             '--image-size',            'px'],
      [contentPadding,        '--content-padding-left',  'px'],
      [imagePadding,          '--image-margin-left',     'px'],
      [imageVerticalPosition, '--image-vertical-offset', 'px'],
      [textVerticalOffset,    '--text-vertical-offset',  'px'],
      [progressBarOffset,     '--progress-bar-offset',   'px'],
    ];

    CONTROLS.forEach(([el, cssVar, unit]) => {
      el.addEventListener('input', () => sendVar(cssVar, el.value + unit));
    });

    textColor.addEventListener('input', () => {
      sendVar('--text-color', textColor.value);
      textColorCode.textContent = textColor.value.toUpperCase();
    });

    progressBarColor.addEventListener('input', () => {
      sendVar('--progress-bar-color', progressBarColor.value);
      progressBarColorCode.textContent = progressBarColor.value.toUpperCase();
    });

    fontFamily.addEventListener('change', () => sendVar('--font-main', fontFamily.value));

    function populateSlidersFromVars(vars) {
      function px(name, fallback) {
        const v = vars[name] || '';
        const m = v.match(/(-?\d+\.?\d*)/);
        return m ? parseFloat(m[1]) : fallback;
      }
      artist_name.value           = px('--artist-size', 30);
      track_title.value           = px('--song-size', 32);
      spacing.value               = px('--text-spacing', 10);
      imageSize.value             = px('--image-size', 140);
      contentPadding.value        = px('--content-padding-left', 50);
      imagePadding.value          = px('--image-margin-left', 0);
      imageVerticalPosition.value = px('--image-vertical-offset', 0);
      textVerticalOffset.value    = px('--text-vertical-offset', 0);
      progressBarOffset.value     = px('--progress-bar-offset', 12);

      const tcVal = vars['--text-color'] || '#ffffff';
      textColor.value = tcVal;
      textColorCode.textContent = tcVal.toUpperCase();

      const pbcVal = vars['--progress-bar-color'] || '#ffffff';
      progressBarColor.value = pbcVal;
      progressBarColorCode.textContent = pbcVal.toUpperCase();

      const font = vars['--font-main'] || 'proxima-nova, sans-serif';
      const opt = Array.from(fontFamily.options).find(o => o.value === font);
      if (opt) fontFamily.value = font;
    }

    function sendAllVars() {
      CONTROLS.forEach(([el, cssVar, unit]) => sendVar(cssVar, el.value + unit));
      sendVar('--text-color', textColor.value);
      textColorCode.textContent = textColor.value.toUpperCase();
      sendVar('--progress-bar-color', progressBarColor.value);
      progressBarColorCode.textContent = progressBarColor.value.toUpperCase();
      sendVar('--font-main', fontFamily.value);
    }

    // Signal editor-shell that controls are ready before nested video resources load
    window.parent.postMessage({ type: 'frame-ready' }, '*');

    window.addEventListener('message', e => {
      if (e.data.type === 'init') {
        if (e.data.cssVars) populateSlidersFromVars(e.data.cssVars);
        previewFrame.addEventListener('load', sendAllVars, { once: true });
        setTimeout(sendAllVars, 800);
      }
      if (e.data.type === 'reset-to-defaults') {
        populateSlidersFromVars(e.data.defaults || {});
        sendAllVars();
      }
      if (e.data.type === 'request-root-block') {
        const css = window.buildRootBlock(e.data.existingVars || {});
        e.source.postMessage({ type: 'root-block', css }, '*');
      }
    });

    // --- Build :root block for saving ---
    window.buildRootBlock = function buildRootBlock(vars) {
      return `:root {
  --text-color: ${textColor.value};
  --progress-bar-color: ${progressBarColor.value};
  --font-main: ${fontFamily.value};
  --artist-size: ${artist_name.value}px;
  --song-size: ${track_title.value}px;
  --text-spacing: ${spacing.value}px;
  --image-size: ${imageSize.value}px;
  --content-padding-left: ${contentPadding.value}px;
  --image-margin-left: ${imagePadding.value}px;
  --image-vertical-offset: ${imageVerticalPosition.value}px;
  --text-vertical-offset: ${textVerticalOffset.value}px;
  --progress-bar-offset: ${progressBarOffset.value}px;
  --scroll-extra: ${vars['--scroll-extra'] || '0px'};
  --scroll-start-offset: ${vars['--scroll-start-offset'] || '30px'};
}`;
    }


  </script>

</body>
</html>
