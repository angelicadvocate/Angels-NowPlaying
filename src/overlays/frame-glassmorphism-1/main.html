<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>F5 Glassmorphism 1</title>
	<link rel="stylesheet" href="./main.css" />
	<script src="../../js/vendor/jquery-3.5.1.min.js"></script>
	<script src="../tuna-port.js"></script>
	<script src="./common.js"></script>
</head>
<body>
	<div id="background">
		<img id="album-art-bg" src="./SampleAlbum.png" alt="" />
		<div id="glass-overlay"></div>
		<div id="content-wrapper">
			<div id="image-wrapper">
				<img id="image" alt="Album Art" />
			</div>
			<div id="content">
				<div id="text-box">
					<div class="text-clip">
						<div class="text-row"><span id="artist" class="text-inner"></span></div>
						<div class="text-row"><span id="song" class="text-inner"></span></div>
					</div>
				</div>
			</div>
		</div>
		<div id="progress-container">
			<div id="progress-bar"></div>
		</div>
	</div>
	<script>
		document.addEventListener('DOMContentLoaded', function () {
			var img = document.getElementById('image');
			var bg = document.getElementById('album-art-bg');
			if (img && bg) {
				new MutationObserver(function () { if (img.src) bg.src = img.src; })
					.observe(img, { attributes: true, attributeFilter: ['src'] });
			}
		});
	</script>
</body>
</html>
