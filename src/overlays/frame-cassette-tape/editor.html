<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cassette Tape — Editor</title>
  <link rel="stylesheet" href="../../css/editor_pages/editor-header.css" />
  <link rel="stylesheet" href="../../css/editor_pages/editor-common.css" />
  <link rel="stylesheet" href="./editor.css" />
  <script type="module" src="../../js/tauri.js"></script>
</head>
<body>
    <!-- Dynamic header placeholder -->
    <div id="header-root" data-src="../../editor_pages/editor-header.html" data-page-title="Cassette Tape"></div>

    <main id="site">
    <div class="controls-grid">
      <div class="controls-column">
      <label for="tapeStyle" class="info">Tape Style</label>
      <select id="tapeStyle" class="dropdown">
        <option value="black-black-dark">Black Tape, Black Text, Dark Label</option>
        <option value="black-white-dark">Black Tape, White Text, Dark Label</option>
        <option value="black-black-light" selected>Black Tape, Black Text, Light Label</option>
        <option value="black-white-light">Black Tape, White Text, Light Label</option>
        <option value="white-black-dark">White Tape, Black Text, Dark Label</option>
        <option value="white-white-dark">White Tape, White Text, Dark Label</option>
        <option value="white-black-light">White Tape, Black Text, Light Label</option>
        <option value="white-white-light">White Tape, White Text, Light Label</option>
      </select>

      <label for="labelHue" class="info">Label Hue</label>
      <input type="range" min="-180" max="180" value="0" class="slider" id="labelHue">
      <div id="autoRotateMessage" style="display: none; padding: 10px; background: #d3d3d3; border-radius: 5px; text-align: center; font-size: 14px; color: var(--highlight); font-weight: bold;">
        Disable hue rotation to set hue color manually.
      </div>

      <label for="autoRotateHue" class="info">Auto Rotate Hue</label>
      <select id="autoRotateHue" class="dropdown">
        <option value="no" selected>No</option>
        <option value="yes">Yes</option>
      </select>

      <label for="fontFamily" class="info">Font Family</label>
      <select id="fontFamily" class="dropdown">
        <option value="proxima-nova, sans-serif">Proxima Nova</option>
        <option value="Comic Sans MS, cursive">Comic Sans MS</option>
        <option value="Brush Script MT, cursive">Brush Script MT</option>
        <option value="Georgia, serif">Georgia</option>
        <option value="Times New Roman, serif">Times New Roman</option>
        <option value="Courier New, monospace" selected>Courier New</option>
        <option value="Trebuchet MS, sans-serif">Trebuchet MS</option>
        <option value="Verdana, sans-serif">Verdana</option>
      </select>
      
      <label for="artistFontSize" class="info">Artist Font Size</label>
      <input type="range" min="8" max="64" value="44" class="slider" id="artistFontSize">

      </div>

      <div class="controls-column">
      <label for="artistPosition" class="info">Artist Position</label>
      <input type="range" min="-50" max="150" value="0" class="slider" id="artistPosition">

      <label for="artistColor" class="info">Artist Color</label>
      <div class="color-picker-container">
        <input type="color" id="artistColor" class="color-picker" value="#000000">
        <div id="artistColorDisplay" class="color-code-overlay">
          <code id="artistColorCode">#000000</code>
        </div>
      </div>

      <label for="songFontSize" class="info">Song Font Size</label>
      <input type="range" min="8" max="64" value="44" class="slider" id="songFontSize">

      <label for="songPosition" class="info">Song Position</label>
      <input type="range" min="-150" max="150" value="0" class="slider" id="songPosition">

      <label for="trackColor" class="info">Song Color</label>
      <div class="color-picker-container">
        <input type="color" id="trackColor" class="color-picker" value="#000000">
        <div id="trackColorDisplay" class="color-code-overlay">
          <code id="trackColorCode">#000000</code>
        </div>
      </div>

      </div>
    </div>

    <!-- Live preview: main.html loaded in ?edit=1 mode -->
    <section id="sample">
      <iframe id="preview-frame" src="./main.html?edit=1" scrolling="no" title="Overlay preview"></iframe>
    </section>
  </main>

  <script>
    // --- Control references ---
    const sliderArtistSize  = document.getElementById('artistFontSize');
    const sliderSongSize    = document.getElementById('songFontSize');
    const sliderArtistPos   = document.getElementById('artistPosition');
    const sliderSongPos     = document.getElementById('songPosition');
    const sliderLabelHue    = document.getElementById('labelHue');
    const pickerArtistColor = document.getElementById('artistColor');
    const pickerSongColor   = document.getElementById('trackColor');
    const selectFont        = document.getElementById('fontFamily');
    const selectTapeStyle   = document.getElementById('tapeStyle');
    const selectAutoRotate  = document.getElementById('autoRotateHue');
    const codeArtist        = document.getElementById('artistColorCode');
    const codeSong          = document.getElementById('trackColorCode');
    const previewFrame      = document.getElementById('preview-frame');

    const CONTROLS = [
      [sliderArtistSize,  '--artist-font-size', 'px'],
      [sliderSongSize,    '--song-font-size',   'px'],
      [sliderArtistPos,   '--artist-position',  'px'],
      [sliderSongPos,     '--song-position',    'px'],
      [sliderLabelHue,    '--label-hue',        'deg'],
      [pickerArtistColor, '--artist-color',     ''],
      [pickerSongColor,   '--track-color',      ''],
    ];

    function sendVar(name, value) {
      if (previewFrame && previewFrame.contentWindow) {
        previewFrame.contentWindow.postMessage({ type: 'setCSSVar', name, value }, '*');
      }
    }

    // Auto-rotate hue
    let autoRotateInterval = null;
    let currentHue = 0;

    function startAutoRotate() {
      currentHue = parseInt(sliderLabelHue.value) || 0;
      autoRotateInterval = setInterval(() => {
        currentHue = (currentHue + 1) % 360;
        sliderLabelHue.value = currentHue;
        sendVar('--label-hue', currentHue + 'deg');
      }, 50);
    }

    function stopAutoRotate() {
      if (autoRotateInterval) { clearInterval(autoRotateInterval); autoRotateInterval = null; }
    }

    // Wire up controls
    CONTROLS.forEach(([el, cssVar, unit]) => {
      el.addEventListener('input', () => {
        if (el === pickerArtistColor) codeArtist.textContent = el.value.toUpperCase();
        if (el === pickerSongColor)   codeSong.textContent   = el.value.toUpperCase();
        sendVar(cssVar, el.value + unit);
      });
    });

    selectFont.addEventListener('change', () => sendVar('--font-family', selectFont.value));
    selectTapeStyle.addEventListener('change', () => sendVar('--tape-style', selectTapeStyle.value));

    selectAutoRotate.addEventListener('change', () => {
      if (selectAutoRotate.value === 'yes') {
        sliderLabelHue.disabled = true;
        document.getElementById('autoRotateMessage').style.display = 'block';
        startAutoRotate();
      } else {
        sliderLabelHue.disabled = false;
        document.getElementById('autoRotateMessage').style.display = 'none';
        stopAutoRotate();
      }
    });

    // Parse :root block from main.css and populate controls
    function parseCSSVars(cssText) {
      const vars = {};
      const rootMatch = cssText.match(/:root\s*\{([^}]*)\}/s);
      if (!rootMatch) return vars;
      rootMatch[1].split('\n').forEach(line => {
        const m = line.match(/^\s*(--[\w-]+)\s*:\s*(.+?)\s*;/);
        if (m) vars[m[1]] = m[2].trim();
      });
      return vars;
    }

    function populateSlidersFromVars(vars) {
      function px(name, fallback) {
        const m = (vars[name] || '').match(/(-?\d+\.?\d*)/);
        return m ? parseFloat(m[1]) : fallback;
      }
      function hex(name, fallback) { return vars[name] || fallback; }

      sliderArtistSize.value = px('--artist-font-size', 44);
      sliderSongSize.value   = px('--song-font-size', 44);
      sliderArtistPos.value  = px('--artist-position', 0);
      sliderSongPos.value    = px('--song-position', 0);
      sliderLabelHue.value   = px('--label-hue', 0);

      const artistHex = hex('--artist-color', '#000000');
      pickerArtistColor.value = artistHex.startsWith('#') ? artistHex : '#000000';
      codeArtist.textContent  = pickerArtistColor.value.toUpperCase();

      const songHex = hex('--track-color', '#000000');
      pickerSongColor.value = songHex.startsWith('#') ? songHex : '#000000';
      codeSong.textContent  = pickerSongColor.value.toUpperCase();

      const font = vars['--font-family'] || 'Courier New, monospace';
      const fontOpt = Array.from(selectFont.options).find(o => o.value === font);
      if (fontOpt) selectFont.value = font;

      const tapeStyle = vars['--tape-style'] || 'black-black-light';
      const tapeOpt = Array.from(selectTapeStyle.options).find(o => o.value === tapeStyle);
      if (tapeOpt) selectTapeStyle.value = tapeStyle;
    }

    function sendAllVars() {
      CONTROLS.forEach(([el, cssVar, unit]) => sendVar(cssVar, el.value + unit));
      sendVar('--font-family', selectFont.value);
      sendVar('--tape-style', selectTapeStyle.value);
    }

    const CSS_PATH = 'src/overlays/frame-cassette-tape/main.css';

    async function readMainCSS() {
      if (window.tauri && window.tauri.invoke) {
        return window.tauri.invoke('read_text_file', { path: CSS_PATH });
      }
      return fetch('./main.css?raw').then(r => r.text()).catch(() => '');
    }

    readMainCSS()
      .then(css => { if (css) populateSlidersFromVars(parseCSSVars(css)); })
      .catch(() => {})
      .finally(() => {
        previewFrame.addEventListener('load', sendAllVars, { once: true });
        setTimeout(sendAllVars, 800);
      });

    function buildRootBlock(vars) {
      return `:root {
  --artist-color: ${pickerArtistColor.value};
  --track-color: ${pickerSongColor.value};
  --font-family: ${selectFont.value};
  --artist-font-size: ${sliderArtistSize.value}px;
  --song-font-size: ${sliderSongSize.value}px;
  --tape-style: ${selectTapeStyle.value};
  --label-hue: ${sliderLabelHue.value}deg;
  --artist-position: ${sliderArtistPos.value}px;
  --song-position: ${sliderSongPos.value}px;

  /* Scroller tuning (read by common.js) */
  --scroll-extra: ${vars['--scroll-extra'] || '0px'};
  --scroll-start-offset: ${vars['--scroll-start-offset'] || '30px'};
}`;
    }

    window.onSave = async function () {
      let existingCSS = '';
      try {
        existingCSS = await readMainCSS();
      } catch (e) {
        alert('Could not read main.css before saving: ' + e);
        return;
      }
      const existingVars = parseCSSVars(existingCSS);
      const newRoot = buildRootBlock(existingVars);
      const updated = existingCSS.replace(/:root\s*\{[^}]*\}/s, newRoot);
      if (window.tauri && window.tauri.invoke) {
        try {
          await window.tauri.invoke('save_css_file', { path: CSS_PATH, content: updated });
          alert('Saved successfully!');
        } catch (e) {
          alert('Failed to save: ' + e);
        }
      } else {
        alert('Tauri API not available. Run inside the app to save.');
      }
    };

    window.onBack = function () { history.back(); };
  </script>

  <script type="module" src="../../js/editor-header-loader.js"></script>
</body>
</html>
