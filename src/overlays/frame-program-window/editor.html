<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Program Window — Editor</title>
  <link rel="stylesheet" href="../../css/editor-header.css" />
  <link rel="stylesheet" href="./editor.css" />
  <link rel="stylesheet" href="../../css/editor-common.css" />
  <script type="module" src="../../js/tauri.js"></script>
</head>
<body>
    <!-- Dynamic header placeholder -->
    <div id="header-root" data-src="../../html/editor-header.html" data-page-title="Program Window"></div>

    <main id="site">
    <section id="controls">
      <label for="fontFamily" class="info">Font Family</label>
      <select id="fontFamily" class="dropdown">
        <option value="proxima-nova, sans-serif" selected>Proxima Nova</option>
        <option value="Comic Sans MS, cursive">Comic Sans MS</option>
        <option value="Brush Script MT, cursive">Brush Script MT</option>
        <option value="Georgia, serif">Georgia</option>
        <option value="Times New Roman, serif">Times New Roman</option>
        <option value="Courier New, monospace">Courier New</option>
        <option value="Trebuchet MS, sans-serif">Trebuchet MS</option>
        <option value="Verdana, sans-serif">Verdana</option>
      </select>

      <label for="artistColor" class="info">Artist Color</label>
      <div class="color-picker-container">
        <input type="color" id="artistColor" class="color-picker" value="#FF8C00">
        <div id="artistColorDisplay" class="color-code-overlay">
          <code id="artistColorCode">#FF8C00</code>
        </div>
      </div>

      <label for="artist_name" class="info">Artist Name Size</label>
      <input type="range" min="24" max="64" value="44" class="slider" id="artist_name">

      <label for="trackColor" class="info">Track Color</label>
      <div class="color-picker-container">
        <input type="color" id="trackColor" class="color-picker" value="#8B4513">
        <div id="trackColorDisplay" class="color-code-overlay">
          <code id="trackColorCode">#8B4513</code>
        </div>
      </div>

      <label for="track_title" class="info">Track Title Size</label>
      <input type="range" min="36" max="80" value="56" class="slider" id="track_title">

      <label for="spacing" class="info">Text Vertical Spacing</label>
      <input type="range" min="10" max="50" value="30" class="slider" id="spacing">

      <label for="contentPadding" class="info">Text Left Padding</label>
      <input type="range" min="20" max="100" value="60" class="slider" id="contentPadding">

      <label for="contentTopPadding" class="info">Text Top Margin</label>
      <input type="range" min="-60" max="100" value="0" class="slider" id="contentTopPadding">
    </section>

    <section id="controls-middle">
      <label for="nowPlayingText" class="info">Custom Text</label>
      <input type="text" id="nowPlayingText" value="Now Playing..." style="width: 350px; padding: 10px; font-size: 16px; border: 2px solid var(--highlight); border-radius: 5px;">

      <label for="nowPlayingColor" class="info">Custom Text Color</label>
      <div class="color-picker-container">
        <input type="color" id="nowPlayingColor" class="color-picker" value="#8B4513">
        <div id="nowPlayingColorDisplay" class="color-code-overlay">
          <code id="nowPlayingColorCode">#8B4513</code>
        </div>
      </div>

      <label for="nowPlayingFontSize" class="info">Custom Text Font Size</label>
      <input type="range" min="20" max="56" value="34" class="slider" id="nowPlayingFontSize">

      <label for="nowPlayingTopMargin" class="info">Custom Text Top Margin</label>
      <input type="range" min="-50" max="50" value="-4" class="slider" id="nowPlayingTopMargin">

      <label for="nowPlayingLeftPadding" class="info">Custom Text Left Padding</label>
      <input type="range" min="-30" max="60" value="0" class="slider" id="nowPlayingLeftPadding">

      <label for="imageTopPadding" class="info">Album Art Top Margin</label>
      <input type="range" min="-80" max="80" value="30" class="slider" id="imageTopPadding">

      <label class="info" for="imageSize">Album Art Size</label>
      <input type="range" min="160" max="280" value="220" class="slider" id="imageSize">

      <label for="imagePadding" class="info">Album Art Left Padding</label>
      <input type="range" min="50" max="150" value="100" class="slider" id="imagePadding">
    </section>

    <section id="controls-right">
      <label for="progressBarColor" class="info">Progress Bar Color</label>
      <div class="color-picker-container">
        <input type="color" id="progressBarColor" class="color-picker" value="#FFC800">
        <div id="progressBarColorDisplay" class="color-code-overlay">
          <code id="progressBarColorCode">#FFC800</code>
        </div>
      </div>

      <label for="frameSaturation" class="info">Frame Saturation</label>
      <input type="range" min="0" max="200" value="100" class="slider" id="frameSaturation">
      
      <label for="frameHue" class="info">Frame Hue</label>
      <input type="range" min="-180" max="180" value="0" class="slider" id="frameHue">
      <div id="autoRotateMessage" style="display: none; padding: 10px; background: #d3d3d3; border-radius: 5px; text-align: center; font-size: 14px; color: var(--highlight); font-weight: bold;">
        Disable hue rotation to set hue color manually.
      </div>

      <label for="autoRotateHue" class="info">Auto Rotate Hue</label>
      <select id="autoRotateHue" class="dropdown">
        <option value="no" selected>No</option>
        <option value="yes-frame">Yes - Frame Only</option>
        <option value="yes-all">Yes - Everything
        </option>
      </select>

      <section id="sample">
        <iframe id="preview-frame" src="./main.html?edit=1" scrolling="no" title="Overlay preview"></iframe>
      </section>
    </section>

    <div style="text-align: center; margin-top: 20px;">
    </div>
  </main>

  <script>
    const fontFamilySelect       = document.getElementById('fontFamily');
    const artistSize             = document.getElementById('artist_name');
    const songSize               = document.getElementById('track_title');
    const spacing                = document.getElementById('spacing');
    const artistColor            = document.getElementById('artistColor');
    const artistColorCode        = document.getElementById('artistColorCode');
    const trackColor             = document.getElementById('trackColor');
    const trackColorCode         = document.getElementById('trackColorCode');
    const frameHue               = document.getElementById('frameHue');
    const autoRotateHue          = document.getElementById('autoRotateHue');
    const frameSaturation        = document.getElementById('frameSaturation');
    const progressBarColor       = document.getElementById('progressBarColor');
    const progressBarColorCode   = document.getElementById('progressBarColorCode');
    const imageSizeSlider        = document.getElementById('imageSize');
    const contentPaddingSlider   = document.getElementById('contentPadding');
    const imagePaddingSlider     = document.getElementById('imagePadding');
    const imageTopPaddingSlider  = document.getElementById('imageTopPadding');
    const contentTopPaddingSlider = document.getElementById('contentTopPadding');
    const nowPlayingTextInput    = document.getElementById('nowPlayingText');
    const nowPlayingFontSizeSlider = document.getElementById('nowPlayingFontSize');
    const nowPlayingTopMarginSlider = document.getElementById('nowPlayingTopMargin');
    const nowPlayingLeftPaddingSlider = document.getElementById('nowPlayingLeftPadding');
    const nowPlayingColor        = document.getElementById('nowPlayingColor');
    const nowPlayingColorCode    = document.getElementById('nowPlayingColorCode');
    const previewFrame           = document.getElementById('preview-frame');

    let autoRotateInterval = null;
    let autoRotateHueMode = 'no';

    // --- Send a CSS variable to the preview iframe ---
    function sendVar(name, value) {
      if (previewFrame && previewFrame.contentWindow) {
        previewFrame.contentWindow.postMessage({ type: 'setCSSVar', name, value }, '*');
      }
    }

    function sendNowPlayingText(text) {
      if (previewFrame && previewFrame.contentWindow) {
        previewFrame.contentWindow.postMessage({ type: 'setNowPlayingText', value: text }, '*');
      }
    }

    // --- Standard slider controls (value → px var) ---
    const CONTROLS = [
      [artistSize,              '--artist-size',              'px'],
      [songSize,                '--song-size',                'px'],
      [spacing,                 '--text-spacing',             'px'],
      [contentPaddingSlider,    '--content-padding-left',     'px'],
      [contentTopPaddingSlider, '--content-margin-top',       'px'],
      [imageSizeSlider,         '--image-size',               'px'],
      [imagePaddingSlider,      '--image-margin-left',        'px'],
      [imageTopPaddingSlider,   '--image-margin-top',         'px'],
      [nowPlayingFontSizeSlider,'--now-playing-size',         'px'],
      [nowPlayingTopMarginSlider,'--now-playing-margin-top',  'px'],
      [nowPlayingLeftPaddingSlider,'--now-playing-padding-left','px'],
    ];

    CONTROLS.forEach(([el, cssVar, unit]) => {
      el.addEventListener('input', () => sendVar(cssVar, el.value + unit));
    });

    artistColor.addEventListener('input', () => {
      sendVar('--artist-color', artistColor.value);
      artistColorCode.textContent = artistColor.value.toUpperCase();
    });
    trackColor.addEventListener('input', () => {
      sendVar('--track-color', trackColor.value);
      trackColorCode.textContent = trackColor.value.toUpperCase();
    });
    nowPlayingColor.addEventListener('input', () => {
      sendVar('--now-playing-color', nowPlayingColor.value);
      nowPlayingColorCode.textContent = nowPlayingColor.value.toUpperCase();
    });
    progressBarColor.addEventListener('input', () => {
      sendVar('--progress-bar-color', progressBarColor.value);
      progressBarColorCode.textContent = progressBarColor.value.toUpperCase();
    });
    fontFamilySelect.addEventListener('change', () => sendVar('--font-main', fontFamilySelect.value));
    nowPlayingTextInput.addEventListener('input', () => sendNowPlayingText(nowPlayingTextInput.value));

    // --- Frame hue / saturation ---
    function applyFilters(hueOverride) {
      const hue = hueOverride !== undefined ? hueOverride : parseFloat(frameHue.value);
      const sat = frameSaturation.value;
      const filter = `hue-rotate(${hue}deg) saturate(${sat}%)`;
      sendVar('--frame-hue', hue + 'deg');
      sendVar('--frame-saturation', sat + '%');
      if (autoRotateHueMode === 'yes-all') {
        sendVar('--content-filter', filter);
      } else {
        sendVar('--content-filter', 'none');
      }
    }

    frameHue.addEventListener('input', () => {
      if (autoRotateHueMode !== 'no') {
        stopAutoRotateHue();
        autoRotateHueMode = 'no';
        autoRotateHue.value = 'no';
        document.getElementById('autoRotateMessage').style.display = 'none';
      }
      applyFilters();
    });

    frameSaturation.addEventListener('input', () => applyFilters());

    function startAutoRotateHue() {
      stopAutoRotateHue();
      let currentHue = 0;
      autoRotateInterval = setInterval(() => {
        currentHue = (currentHue + 1) % 360;
        frameHue.value = currentHue;
        applyFilters(currentHue);
      }, 60);
    }

    function stopAutoRotateHue() {
      if (autoRotateInterval) {
        clearInterval(autoRotateInterval);
        autoRotateInterval = null;
      }
      frameHue.value = 0;
      applyFilters();
    }

    autoRotateHue.addEventListener('change', () => {
      const val = autoRotateHue.value;
      autoRotateHueMode = val;
      stopAutoRotateHue();
      if (val === 'yes-frame' || val === 'yes-all') {
        frameHue.style.display = 'none';
        frameHue.disabled = true;
        document.getElementById('autoRotateMessage').style.display = 'block';
        startAutoRotateHue();
      } else {
        frameHue.style.display = 'block';
        frameHue.disabled = false;
        document.getElementById('autoRotateMessage').style.display = 'none';
        applyFilters();
      }
    });

    function populateSlidersFromVars(vars) {
      function px(name, fallback) {
        const v = vars[name] || '';
        const m = v.match(/(-?\d+\.?\d*)/);
        return m ? parseFloat(m[1]) : fallback;
      }
      artistSize.value              = px('--artist-size', 44);
      songSize.value                = px('--song-size', 56);
      spacing.value                 = px('--text-spacing', 30);
      contentPaddingSlider.value    = px('--content-padding-left', 60);
      contentTopPaddingSlider.value = px('--content-margin-top', 0);
      imageSizeSlider.value         = px('--image-size', 220);
      imagePaddingSlider.value      = px('--image-margin-left', 100);
      imageTopPaddingSlider.value   = px('--image-margin-top', 30);
      nowPlayingFontSizeSlider.value    = px('--now-playing-size', 34);
      nowPlayingTopMarginSlider.value   = px('--now-playing-margin-top', -4);
      nowPlayingLeftPaddingSlider.value = px('--now-playing-padding-left', 0);
      frameHue.value        = px('--frame-hue', 0);
      frameSaturation.value = px('--frame-saturation', 100);

      const ac = vars['--artist-color'] || '#FF8C00';
      artistColor.value = ac; artistColorCode.textContent = ac.toUpperCase();
      const tc = vars['--track-color'] || '#8B4513';
      trackColor.value = tc; trackColorCode.textContent = tc.toUpperCase();
      const npc = vars['--now-playing-color'] || '#8B4513';
      nowPlayingColor.value = npc; nowPlayingColorCode.textContent = npc.toUpperCase();
      const pbc = vars['--progress-bar-color'] || '#FFC800';
      progressBarColor.value = pbc; progressBarColorCode.textContent = pbc.toUpperCase();

      const font = vars['--font-main'] || 'proxima-nova, sans-serif';
      const opt = Array.from(fontFamilySelect.options).find(o => o.value === font);
      if (opt) fontFamilySelect.value = font;

      const rawText = vars['--now-playing-text'] || '"Now Playing..."';
      nowPlayingTextInput.value = rawText.replace(/^"|"$/g, '');
    }

    function sendAllVars() {
      CONTROLS.forEach(([el, cssVar, unit]) => sendVar(cssVar, el.value + unit));
      sendVar('--artist-color', artistColor.value);
      artistColorCode.textContent = artistColor.value.toUpperCase();
      sendVar('--track-color', trackColor.value);
      trackColorCode.textContent = trackColor.value.toUpperCase();
      sendVar('--now-playing-color', nowPlayingColor.value);
      nowPlayingColorCode.textContent = nowPlayingColor.value.toUpperCase();
      sendVar('--progress-bar-color', progressBarColor.value);
      progressBarColorCode.textContent = progressBarColor.value.toUpperCase();
      sendVar('--font-main', fontFamilySelect.value);
      sendNowPlayingText(nowPlayingTextInput.value);
      applyFilters();
    }

    document.addEventListener('headerLoaded', e => {
      if (e.detail && e.detail.cssVars) populateSlidersFromVars(e.detail.cssVars);
      previewFrame.addEventListener('load', sendAllVars, { once: true });
      setTimeout(sendAllVars, 800);
    });

    // --- Build :root block for saving ---
    window.buildRootBlock = function buildRootBlock(vars) {
      return `:root {
  --font-main: ${fontFamilySelect.value};
  --artist-color: ${artistColor.value};
  --artist-size: ${artistSize.value}px;
  --track-color: ${trackColor.value};
  --song-size: ${songSize.value}px;
  --text-spacing: ${spacing.value}px;
  --content-padding-left: ${contentPaddingSlider.value}px;
  --content-margin-top: ${contentTopPaddingSlider.value}px;
  --now-playing-color: ${nowPlayingColor.value};
  --now-playing-size: ${nowPlayingFontSizeSlider.value}px;
  --now-playing-margin-top: ${nowPlayingTopMarginSlider.value}px;
  --now-playing-padding-left: ${nowPlayingLeftPaddingSlider.value}px;
  --image-margin-top: ${imageTopPaddingSlider.value}px;
  --image-size: ${imageSizeSlider.value}px;
  --image-margin-left: ${imagePaddingSlider.value}px;
  --progress-bar-color: ${progressBarColor.value};
  --frame-hue: ${frameHue.value}deg;
  --frame-saturation: ${frameSaturation.value}%;
  --now-playing-text: "${nowPlayingTextInput.value.replace(/"/g, '\\"')}";
  --scroll-extra: ${vars['--scroll-extra'] || '0px'};
  --scroll-start-offset: ${vars['--scroll-start-offset'] || '30px'};
}`;
    }


  </script>

  <script type="module" src="../../js/editor-header-loader.js"></script>
</body>
</html>
