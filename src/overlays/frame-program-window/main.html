<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>F11 Now Playing</title>
	<link rel="stylesheet" href="./main.css" />
	<script src="../../js/vendor/jquery-3.5.1.min.js"></script>
	<script src="../tuna-port.js"></script>
	<script src="./common.js"></script>
</head>
<body>
	<div id="background">
		<img id="frame-image" src="./program-window-frame-0.png" alt="Frame" />
		<div id="now-playing-container">
			<p id="now-playing-text">Now Playing...</p>
		</div>
		<div id="image-wrapper">
			<img id="image" alt="Album Art" src="./SampleAlbum.png" />
		</div>
		<div id="content">
			<div id="text-box">
				<div class="text-clip"><span id="artist" class="text-inner"></span></div>
				<div class="text-clip"><span id="song" class="text-inner"></span></div>
			</div>
		</div>
		<div id="progress-container">
			<div id="progress-bar"></div>
		</div>
	</div>
	<script>
		window.addEventListener('message', function (e) {
			if (e.data && e.data.type === 'setNowPlayingText') {
				var el = document.getElementById('now-playing-text');
				if (el) el.textContent = e.data.value;
			}
		});
		// Read saved text from CSS var on load (strip surrounding quotes)
		(function () {
			var raw = getComputedStyle(document.documentElement).getPropertyValue('--now-playing-text').trim();
			if (raw) {
				var el = document.getElementById('now-playing-text');
				if (el) el.textContent = raw.replace(/^"|"$/g, '');
			}
		})();
	</script>
</body>
</html>
