<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Angel's-NowPlaying</title>
  <link rel="stylesheet" href="./main.css" />
    <link rel="stylesheet" href="../../fonts/fonts.css" />
  <script src="../../js/vendor/jquery-3.5.1.min.js"></script>
  <script src="../tuna-port.js"></script>
  <script src="./common.js"></script>
</head>
<body>
  <div id="background">
    <img id="image" src="./SampleAlbum.png" />
    <!-- Pseudo-visualizer: plays the looped visualizer animation in the background -->
    <video id="visualizer" autoplay muted loop playsinline preload="auto">
      <source src="./visualizer.webm" type="video/webm" />
    </video>
    <div id="content">
      <div id="text-box">
        <div class="text-clip">
          <div class="text-row"><span id="artist" class="text-inner"></span></div>
          <div class="text-row"><span id="song" class="text-inner"></span></div>
        </div>
        <div id="progress-container">
          <div id="progress-bar"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
