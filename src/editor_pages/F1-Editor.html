<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EditorV2-Frame1</title>
  <link rel="stylesheet" href="../css/editor_pages/editor-header.css" />
  <link rel="stylesheet" href="../css/editor_pages/F1-Editor.css" />
  <link rel="stylesheet" href="../css/editor_pages/editor-common.css" />
  <script src="https://unpkg.com/@tauri-apps/api@latest/dist/index.umd.js"></script>
</head>
<body>
    <!-- Dynamic header placeholder. Loaded at runtime by header-loader.js -->
    <div id="header-root" data-src="../editor_pages/editor-header.html" data-page-title="Frame 1 - Horizontal 1"></div>

    <main id="site">
      <div class="controls-grid">
        <div class="controls-column">
          <label for="fontFamily" class="info">Font Family</label>
          <select id="fontFamily" class="dropdown">
            <option value="proxima-nova, sans-serif" selected>Proxima Nova</option>
            <option value="Comic Sans MS, cursive">Comic Sans MS</option>
            <option value="Brush Script MT, cursive">Brush Script MT</option>
            <option value="Georgia, serif">Georgia</option>
            <option value="Times New Roman, serif">Times New Roman</option>
            <option value="Courier New, monospace">Courier New</option>
            <option value="Trebuchet MS, sans-serif">Trebuchet MS</option>
            <option value="Verdana, sans-serif">Verdana</option>
          </select>

          <label for="artist_name" class="info">Artist Name Size</label>
          <input type="range" min="8" max="32" value="16" class="slider" id="artist_name"> 

          <label for="track_title" class="info">Track Title Size</label>
          <input type="range" min="8" max="32" value="24" class="slider" id="track_title">  

          <label for="spacing" class="info">Text Vertical Spacing</label>
          <input type="range" min="-8" max="20" value="4" class="slider" id="spacing">  
          
          <label for="textVerticalOffset" class="info">Text Vertical Position</label>
          <input type="range" min="-30" max="30" value="-8" class="slider" id="textVerticalOffset">

          <label for="contentPadding" class="info">Text Left Padding</label>
          <input type="range" min="0" max="50" value="15" class="slider" id="contentPadding">
        </div>

        <div class="controls-column">
          <label for="color" class="info">Accent Color</label>
          <div class="color-picker-container">
            <input type="color" id="color" class="color-picker" value="#3b82f6">
            <div id="colorDisplay" class="color-code-overlay"><code id="colorCode">#3b82f6</code></div>
          </div>
          <label class="info" for="imageSize">Album Art Size</label>
          <input type="range" min="40" max="150" value="70" class="slider" id="imageSize">

          <label for="imageVerticalPosition" class="info">Image Vertical Position</label>
          <input type="range" min="-50" max="50" value="0" class="slider" id="imageVerticalPosition">

          <label for="progressBarOffset" class="info">Progress Bar Vertical Position</label>
          <input type="range" min="-30" max="30" value="-5" class="slider" id="progressBarOffset">

          <label for="imagePadding" class="info">Image Left Padding</label>
          <input type="range" min="-50" max="50" value="30" class="slider" id="imagePadding">

          <label for="trackColor" class="info">Track Title Color</label>
          <div class="color-picker-container">
            <input type="color" id="trackColor" class="color-picker" value="#FFFFFF">
            <div id="trackColorDisplay" class="color-code-overlay">
              <code id="trackColorCode">#FFFFFF</code>
            </div>
          </div>
        </div>
      </div>

    <section id="sample">
      <div id="background">
        <div id="image-wrapper">
      <img id="image" src="../assets/SampleAlbum.png" alt="Album Art" />
        </div>
        <div id="content">
          <div id="text-box">
            <p id="artist">Sample Artist</p>
            <p id="song">Sample Song Title</p>
          </div>
        </div>
        <div id="progress-container">
          <div id="progress-bar"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const artistSize = document.getElementById("artist_name");
    const songSize = document.getElementById("track_title");
    const spacing = document.getElementById("spacing");
    const color = document.getElementById("color");
    const trackColor = document.getElementById("trackColor");
    const fontFamily = document.getElementById("fontFamily");
    const artistEl = document.getElementById("artist");
    const songEl = document.getElementById("song");
    const image = document.getElementById('image');
    const imageSizeSlider = document.getElementById('imageSize');
    const contentPaddingSlider = document.getElementById('contentPadding');
    const imageVerticalPosition = document.getElementById('imageVerticalPosition');
    const textVerticalOffset = document.getElementById('textVerticalOffset');
    const progressBarOffset = document.getElementById('progressBarOffset');
    const imagePaddingSlider = document.getElementById('imagePadding');

    let imagePaddingValue = imagePaddingSlider.value;    
    let contentPaddingValue = contentPaddingSlider.value;
    let imageSizeValue = imageSizeSlider.value;
    let imageVerticalPositionValue = imageVerticalPosition.value;
    let artistSizeValue = artistSize.value;
    let songSizeValue = songSize.value;
    let spacingValue = spacing.value;
    let colorValue = color.value; // hex string like #ff66aa
    let trackColorValue = trackColor ? trackColor.value : '#ffffff';
    let textVerticalOffsetValue = textVerticalOffset.value;
    let progressBarOffsetValue = progressBarOffset ? progressBarOffset.value : 0;
    let fontFamilyValue = fontFamily.value;

    function hexToHsl(hex) {
      const r = parseInt(hex.slice(1,3),16)/255;
      const g = parseInt(hex.slice(3,5),16)/255;
      const b = parseInt(hex.slice(5,7),16)/255;
      const max = Math.max(r,g,b), min = Math.min(r,g,b);
      let h=0, s=0, l=(max+min)/2;
      if(max!==min){
        const d = max-min;
        s = l>0.5? d/(2-max-min) : d/(max+min);
        switch(max){
          case r: h = (g-b)/d + (g<b?6:0); break;
          case g: h = (b-r)/d + 2; break;
          case b: h = (r-g)/d + 4; break;
        }
        h = Math.round(h*60);
        s = Math.round(s*100);
        l = Math.round(l*100);
      } else { h = 0; s = 0; l = Math.round(l*100); }
      return [h,s,l];
    }

    const scale = 2;

function applyPreview() {
    artistEl.style.fontSize = artistSizeValue + "px";
    songEl.style.fontSize = songSizeValue + "px";
    artistEl.style.marginBottom = spacingValue + "px";
    // colorValue is a hex string; apply directly for preview
    artistEl.style.color = colorValue;
    // track title has its own picker
    songEl.style.color = trackColorValue;
      artistEl.style.fontFamily = fontFamilyValue;
      songEl.style.fontFamily = fontFamilyValue;
  // Update badge display (uppercase)
  document.getElementById("colorCode").textContent = (colorValue || '').toUpperCase();

  image.style.width = imageSizeValue + "px";
  image.style.height = imageSizeValue + "px";
  const content = document.getElementById('content');
  content.style.padding = `0 20px 0 ${contentPaddingValue}px`;
  content.style.transform = `translateY(${textVerticalOffsetValue}px)`;
  const imageWrapper = document.getElementById('image-wrapper');
  imageWrapper.style.marginLeft = imagePaddingValue + "px";
  // Apply image vertical position similar to F5/F2
  imageWrapper.style.marginTop = imageVerticalPositionValue + "px";
  
  // Update progress bar positioning and color dynamically
  const progressContainer = document.getElementById('progress-container');
  const progressBar = document.getElementById('progress-bar');
  if (progressContainer && progressBar) {
    // Calculate dynamic positioning based on image position and size
    const imageLeftPos = parseInt(imagePaddingValue) + 5; // Base padding + image padding
    const imageRightEdge = imageLeftPos + parseInt(imageSizeValue);
    const progressStartPos = imageRightEdge + 10; // Small gap after image
    const containerWidth = 400; // Preview container width
    const progressWidth = containerWidth - progressStartPos - 30; // Leave some right margin
    
    progressContainer.style.left = progressStartPos + "px";
    progressContainer.style.width = progressWidth + "px";
    // Apply vertical offset to progress bar (preview)
    progressContainer.style.bottom = `${6 - progressBarOffsetValue}px`;

    // Update progress bar color to match accent color (same as artist)
        progressBar.style.backgroundColor = colorValue;
  }
}


    function generateCSS() {
      // Generate CSS matching css/01-NowPlaying-F1-Styles.css structure.
      // The editor preview uses a `scale` factor to keep UI compact; the
      // runtime files use absolute pixel values. Multiply slider values by
      // scale to produce equivalent final sizes.
      return `
/* /static css placeholder/ */

:root {
  /* derive an HSL hue from the picked hex so generated CSS keeps the same hue-based highlight */
  --highlight: hsl(${Math.min(360, Math.max(0, hexToHsl(colorValue)[0] || 221))}, 82%, 58%);
  --font-main: "proxima-nova", sans-serif;
}

/* Reset and base styles */
body {
  background: #ebebeb;
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: var(--font-main);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Widget container */
#background {
  position: relative;
  width: ${400 * scale}px;
  min-width: ${400 * scale}px;
  max-width: ${400 * scale}px;
  height: ${90 * scale}px;
  background-image: url('../assets/Frame1.png');
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
  border-radius: ${8 * scale}px;
  box-sizing: border-box;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  overflow: visible;
  z-index: 1;
}

/* Album art image (main) */
#image {
  width: ${imageSizeValue * scale}px;
  height: ${imageSizeValue * scale}px;
  object-fit: cover;
  margin-left: ${imagePaddingValue * scale}px;
  margin-top: ${imageVerticalPositionValue * scale}px;
  border-radius: ${4 * scale}px;
  display: block;
}

/* Fading overlay image */
#image-wrapper {
  position: relative;
  flex-shrink: 0;
  overflow: visible;
  margin-left: 0px;
  padding-left: 0;
  z-index: 5;
}

/* Flex container for image + text */
#content {
  flex: 1;
  overflow: hidden;
  padding: 0 ${20 * scale}px 0 ${contentPaddingValue * scale}px;
  box-sizing: border-box;
  display: flex;
  flex-direction: row;
  align-items: center;
}

/* Text container */
#text-box {
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-width: 0;
  flex-grow: 1;
  overflow: hidden;
  text-align: left;
}

#artist,
#song {
  position: relative;
  margin: 0;
}

.text-box {
  width: 100%;
  overflow: hidden;
  white-space: nowrap;
  position: relative;
}


/* Artist name styling */
#artist {
  text-transform: uppercase;
  font-weight: 600;
  font-size: ${artistSizeValue * scale}px;
  margin-bottom: ${spacingValue * scale}px;
  color: var(--highlight);
}

/* Song title styling */
#song {
  font-weight: bold;
  font-size: ${songSizeValue * scale}px;
  color: white;
  margin: 0;
}

p {
  white-space: nowrap;
}

/* Scrolling span */
#text-box span {
  display: inline-block;
  white-space: nowrap;
  will-change: transform;
  opacity: 0;
  transition: opacity 0.3s ease;
  transform: translateX(var(--marquee-start, 0));
}

/* Marquee animation */
.marquee {
  animation-name: marqueeAnim;
  animation-timing-function: linear;
  animation-iteration-count: infinite;
  animation-duration: var(--marquee-duration, 10s);
}

@keyframes marqueeAnim {
  0% {
    transform: translateX(var(--marquee-start, 0));
  }
  100% {
    transform: translateX(var(--marquee-end, 0));
  }
}

# Progress bar container - dynamically positioned */
#progress-container {
  position: absolute;
  bottom: 0;
  left: ${(parseInt(imagePaddingValue) * scale + parseInt(imageSizeValue) * scale + 20)}px;
  width: ${(400 * scale) - (parseInt(imagePaddingValue) * scale + parseInt(imageSizeValue) * scale + 60)}px;
  margin-bottom: ${(12 - parseInt(progressBarOffsetValue || 0)) * scale}px;
  height: ${15 * scale}px;
  background-color: rgba(255, 255, 255, 0.1);
  overflow: hidden;
  border-radius: 10px 10px 10px 10px;
  z-index: 9999;
}

#progress-bar {
  height: 100%;
  width: 0%;
  background-color: var(--highlight);
  transition: width 0.3s linear;
}

      `.trim();
    }

    function downloadCSS(filename, content) {
      const blob = new Blob([content], {type: "text/css"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => {
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 0);
    }

  [artistSize, songSize, spacing, color, trackColor, imageSizeSlider, contentPaddingSlider, imageVerticalPosition, textVerticalOffset, progressBarOffset, imagePaddingSlider].forEach((slider) => {
    slider.addEventListener("input", (e) => {
      if (e.target === artistSize) artistSizeValue = e.target.value;
      if (e.target === songSize) songSizeValue = e.target.value;
      if (e.target === spacing) spacingValue = e.target.value;
      if (e.target === color) colorValue = e.target.value;
      if (e.target === trackColor) trackColorValue = e.target.value;
      if (e.target === imageSizeSlider) imageSizeValue = e.target.value;
      if (e.target === contentPaddingSlider) contentPaddingValue = e.target.value;
      if (e.target === imageVerticalPosition) imageVerticalPositionValue = e.target.value;
      if (e.target === textVerticalOffset) textVerticalOffsetValue = e.target.value;
      if (e.target === progressBarOffset) progressBarOffsetValue = e.target.value;
      if (e.target === imagePaddingSlider) imagePaddingValue = e.target.value;
      applyPreview();
    });
  });

// Font selector change handler
fontFamily.addEventListener('change', (e) => {
  fontFamilyValue = e.target.value;
  applyPreview();
});

    applyPreview();

    // Provide page-specific header callbacks for the dynamic header loader
    window.onSave = async function() {
      applyPreview();
      const cssContent = generateCSS();
      // Path relative to project root for Tauri backend
      const cssPath = "src/css/main_pages/01-NowPlaying-F1-Styles.css";
        if (window.tauri && window.tauri.invoke) {
          try {
            await window.tauri.invoke("save_css_file", { path: cssPath, content: cssContent });
            alert("CSS saved successfully!");
          } catch (e) {
            alert("Failed to save CSS: " + e);
          }
        } else {
          alert("Tauri API not available. Please run inside the Tauri app.");
      }
    };
    window.onBack = function() { history.back(); };
    window.onCopy = function() { navigator.clipboard.writeText(window.location.href).catch(()=>{}); };

  </script>

  <script src="../js/editor-header-loader.js"></script>

</body>
</html>
