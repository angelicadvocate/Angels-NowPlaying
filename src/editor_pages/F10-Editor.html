<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EditorV2-Frame10</title>
  <link rel="stylesheet" href="../css/editor_pages/header.css" />
  <link rel="stylesheet" href="../css/editor_pages/F10-Editor.css" />
</head>
<body>
    <!-- Header Module -->
    <header id="editor-header">
      <div class="header-content">
        <!-- Left Section: Logo & Back Button -->
        <div class="header-left">
          <div class="logo">Angel's NowPlaying</div>
          <button id="back-btn" class="header-btn" onclick="history.back()" title="Back to Editor Dashboard">
            <span class="btn-icon">←</span> Back
          </button>
        </div>

        <!-- Middle Section: Page Title -->
        <div class="header-middle">
          <h1 id="page-title">Frame 10 - Color Bar Visualizer</h1>
        </div>

        <!-- Right Section: Action Buttons -->
        <div class="header-right">
          <button id="copy-url-btn" class="header-btn" title="Copy URL to Clipboard">
            <span class="btn-icon">📋</span> Copy URL
          </button>
          <button id="save-btn" class="header-btn primary" title="Save Configuration">
            <span class="btn-icon">💾</span> Save
          </button>
        </div>
      </div>
    </header>

    <main id="site">
    <section id="controls">
      <label for="fontFamily" class="info">Font Family</label>
      <select id="fontFamily" class="dropdown">
        <option value="proxima-nova, sans-serif" selected>Proxima Nova</option>
        <option value="Comic Sans MS, cursive">Comic Sans MS</option>
        <option value="Brush Script MT, cursive">Brush Script MT</option>
        <option value="Georgia, serif">Georgia</option>
        <option value="Times New Roman, serif">Times New Roman</option>
        <option value="Courier New, monospace">Courier New</option>
        <option value="Trebuchet MS, sans-serif">Trebuchet MS</option>
        <option value="Verdana, sans-serif">Verdana</option>
      </select>

      <label class="info" for="imageSize">Album Art Size</label>
      <input type="range" min="40" max="150" value="70" class="slider" id="imageSize">

      <label for="artist_name" class="info">Artist Name Size</label>
      <input type="range" min="8" max="32" value="16" class="slider" id="artist_name"> 

      <label for="track_title" class="info">Track Title Size</label>
      <input type="range" min="8" max="32" value="24" class="slider" id="track_title">  

      <label for="spacing" class="info">Spacing Horizontal</label>
      <input type="range" min="-8" max="20" value="1" class="slider" id="spacing">

      <label for="textVerticalOffset" class="info">Text Vertical Position</label>
      <input type="range" min="-50" max="30" value="-7" class="slider" id="textVerticalOffset">

      <label for="progressBarOffset" class="info">Progress Bar Vertical Position</label>
      <input type="range" min="-30" max="30" value="-5" class="slider" id="progressBarOffset">
    </section>

    <section id="controls-middle">
      <label for="accentColor" class="info">Accent Color</label>
      <div class="color-picker-container">
        <input type="color" id="accentColor" class="color-picker" value="#db0000">
        <div id="accentColorDisplay" class="color-code-overlay">
          <code id="accentColorCode">#DB0000</code>
        </div>
      </div>

      <label for="contentPadding" class="info">Text Left Padding</label>
      <input type="range" min="0" max="50" value="15" class="slider" id="contentPadding">

      <label for="imagePadding" class="info">Image Left Padding</label>
      <input type="range" min="-50" max="50" value="30" class="slider" id="imagePadding">

      <label for="frameOpacity" class="info">Frame Opacity</label>
      <input type="range" min="0" max="100" value="100" class="slider" id="frameOpacity">

      <label for="frameBrightness" class="info">Frame Brightness</label>
      <input type="range" min="50" max="150" value="100" class="slider" id="frameBrightness">

      <label for="frameHue" class="info">Frame Hue</label>
      <input type="range" min="-180" max="180" value="0" class="slider" id="frameHue">
      <div id="autoRotateMessage" style="display: none; padding: 10px; background: #d3d3d3; border-radius: 5px; text-align: center; font-size: 14px; color: var(--highlight); font-weight: bold;">
        Disable hue rotation to set hue color manually.
      </div>

      <label for="autoRotateHue" class="info">Auto Rotate Hue</label>
      <select id="autoRotateHue" class="dropdown">
        <option value="no" selected>No</option>
        <option value="yes">Yes</option>
      </select>
    </section>

    <section id="sample">
      <div id="background">
        <!-- Frame PNG with filters -->
        <img id="frame-image" src="../assets/Frame10.png" alt="Frame" />
        <!-- Visualizer at top -->
        <video id="visualizer-preview" autoplay loop muted playsinline>
          <source src="../assets/color-bar-visualizer.webm" type="video/webm">
        </video>
        <div id="image-wrapper">
      <img id="image" src="../assets/SampleAlbum.png" alt="Album Art" />
        </div>
        <div id="content">
          <div id="text-box">
            <p id="artist">Sample Artist</p>
            <p id="song">Sample Song Title</p>
          </div>
        </div>
        <div id="progress-container-preview">
          <div id="progress-bar-preview"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const fontFamily = document.getElementById("fontFamily");
    const artistSize = document.getElementById("artist_name");
    const songSize = document.getElementById("track_title");
    const spacing = document.getElementById("spacing");
    const accentColor = document.getElementById("accentColor");
    const artistEl = document.getElementById("artist");
    const songEl = document.getElementById("song");
    const image = document.getElementById('image');
    const imageSizeSlider = document.getElementById('imageSize');
    const contentPaddingSlider = document.getElementById('contentPadding');
    const imagePaddingSlider = document.getElementById('imagePadding');
    const frameOpacitySlider = document.getElementById('frameOpacity');
    const frameBrightnessSlider = document.getElementById('frameBrightness');
    const frameHue = document.getElementById('frameHue');
    const autoRotateHue = document.getElementById('autoRotateHue');
    const textVerticalOffsetSlider = document.getElementById('textVerticalOffset');
    const progressBarOffsetSlider = document.getElementById('progressBarOffset');

    let fontFamilyValue = fontFamily.value;
    let imagePaddingValue = imagePaddingSlider.value;    
    let contentPaddingValue = contentPaddingSlider.value;
    let imageSizeValue = imageSizeSlider.value;
    let frameOpacityValue = frameOpacitySlider.value;
    let frameBrightnessValue = frameBrightnessSlider.value;
    let artistSizeValue = artistSize.value;
    let textVerticalOffsetValue = textVerticalOffsetSlider.value;
    let progressBarOffsetValue = progressBarOffsetSlider.value;
    let songSizeValue = songSize.value;
    let spacingValue = spacing.value;
    let accentColorValue = accentColor.value || "#db0000";
    let frameHueValue = frameHue.value;
    let autoRotateHueValue = autoRotateHue.value;

    const scale = 2;

function applyPreview() {
  artistEl.style.fontSize = artistSizeValue + "px";
  songEl.style.fontSize = songSizeValue + "px";
  artistEl.style.marginBottom = spacingValue + "px";
  artistEl.style.color = accentColorValue;
  artistEl.style.fontFamily = fontFamilyValue;
  artistEl.style.textShadow = "0 2px 4px rgba(0, 0, 0, 0.5)";
  songEl.style.fontFamily = fontFamilyValue;
  songEl.style.textShadow = "0 2px 4px rgba(0, 0, 0, 0.5)";
  
  // Display hex color code
  document.getElementById("accentColorCode").textContent = accentColorValue.toUpperCase();

  image.style.width = imageSizeValue + "px";
  image.style.height = imageSizeValue + "px";
  image.style.filter = "drop-shadow(0 4px 8px rgba(0, 0, 0, 0.4))";
  const content = document.getElementById('content');
  content.style.padding = `0 20px 0 ${contentPaddingValue}px`;
  content.style.transform = `translateY(${textVerticalOffsetValue}px)`;
  const imageWrapper = document.getElementById('image-wrapper');
  imageWrapper.style.marginLeft = imagePaddingValue + "px";
  
  // Update progress bar positioning and color dynamically
  const progressContainer = document.getElementById('progress-container-preview');
  const progressBar = document.getElementById('progress-bar-preview');
  if (progressContainer && progressBar) {
    // Calculate dynamic positioning based on image position and size
    const imageLeftPos = parseInt(imagePaddingValue) + 5; // Base padding + image padding
    const imageRightEdge = imageLeftPos + parseInt(imageSizeValue);
    const progressStartPos = imageRightEdge + 10; // Small gap after image
    const containerWidth = 400; // Preview container width
    const progressWidth = containerWidth - progressStartPos - 30; // Leave some right margin
    
    progressContainer.style.left = progressStartPos + "px";
    progressContainer.style.width = progressWidth + "px";
    progressContainer.style.transform = `translateY(${progressBarOffsetValue}px)`;
    progressContainer.style.filter = "drop-shadow(0 2px 4px rgba(0, 0, 0, 0.4))";
    
    // Update progress bar color to match accent color
    progressBar.style.backgroundColor = accentColorValue;
  }

  // Update frame opacity and brightness
  const background = document.getElementById('background');
  const opacityValue = frameOpacityValue / 100;
  const brightnessValue = frameBrightnessValue / 100;
  
  // Frame opacity affects the entire container
  background.style.opacity = opacityValue;
  
  // Apply frame hue rotation and brightness to frame image only
  document.getElementById("frame-image").style.filter = `hue-rotate(${frameHueValue}deg) brightness(${brightnessValue}) drop-shadow(0 4px 12px rgba(0, 0, 0, 0.4))`;
  
  // Apply hue rotation to visualizer video
  const visualizer = document.getElementById('visualizer-preview');
  if (visualizer) {
    visualizer.style.filter = `hue-rotate(${frameHueValue}deg)`;
  }
}


    function generateCSS() {
      // Convert hex color to HSL for CSS output
      function hexToHsl(hex) {
        hex = hex.replace(/^#/, '');
        const r = parseInt(hex.substring(0, 2), 16) / 255;
        const g = parseInt(hex.substring(2, 4), 16) / 255;
        const b = parseInt(hex.substring(4, 6), 16) / 255;
        
        const max = Math.max(r, g, b);
        const min = Math.min(r, g, b);
        let h, s, l = (max + min) / 2;
        
        if (max === min) {
          h = s = 0;
        } else {
          const d = max - min;
          s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
          switch (max) {
            case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
            case g: h = ((b - r) / d + 2) / 6; break;
            case b: h = ((r - g) / d + 4) / 6; break;
          }
        }
        
        h = Math.round(h * 360);
        s = Math.round(s * 100);
        l = Math.round(l * 100);
        
        return `${h}, ${s}%, ${l}%`;
      }
      
      const highlightHsl = hexToHsl(accentColorValue);
      const brightnessValue = frameBrightnessValue / 100;
      
      // Generate CSS matching css/01-NowPlaying-F10-Styles.css structure.
      // The editor preview uses a `scale` factor to keep UI compact; the
      // runtime files use absolute pixel values. Multiply slider values by
      // scale to produce equivalent final sizes.
      return `
/* /static css placeholder/ */

:root {
  --highlight: hsl(${highlightHsl});
  --font-main: ${fontFamilyValue};
}

/* Reset and base styles */
body {
  background: #ebebeb;
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: var(--font-main);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Widget container */
#background {
  position: relative;
  width: ${400 * scale}px;
  min-width: ${400 * scale}px;
  max-width: ${400 * scale}px;
  height: ${90 * scale}px;
  background-image: url('../assets/Frame1.png');
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
  border-radius: ${8 * scale}px;
  box-sizing: border-box;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  overflow: visible;
  z-index: 1;
}

/* Frame image with filters */
#frame-image {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  border-radius: ${8 * scale}px;
  filter: hue-rotate(${frameHueValue}deg) brightness(${brightnessValue}) drop-shadow(0 4px 12px rgba(0, 0, 0, 0.4));
  z-index: 0;
}

/* Album art image (main) */
#image {
  width: ${imageSizeValue * scale}px;
  height: ${imageSizeValue * scale}px;
  object-fit: cover;
  margin-left: ${imagePaddingValue * scale}px;
  border-radius: ${4 * scale}px;
  display: block;
  filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.4));
}

/* Fading overlay image */
#image-wrapper {
  position: relative;
  flex-shrink: 0;
  overflow: visible;
  margin-left: 0px;
  padding-left: 0;
  z-index: 5;
}

/* Flex container for image + text */
#content {
  flex: 1;
  overflow: hidden;
  padding: 0 ${20 * scale}px 0 ${contentPaddingValue * scale}px;
  box-sizing: border-box;
  display: flex;
  flex-direction: row;
  align-items: center;
  transform: translateY(${textVerticalOffsetValue * scale}px);
}

/* Text container */
#text-box {
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-width: 0;
  flex-grow: 1;
  overflow: hidden;
  text-align: left;
}

#artist,
#song {
  position: relative;
  margin: 0;
}

.text-box {
  width: 100%;
  overflow: hidden;
  white-space: nowrap;
  position: relative;
}


/* Artist name styling */
#artist {
  text-transform: uppercase;
  font-weight: 600;
  font-size: ${artistSizeValue * scale}px;
  margin-bottom: ${spacingValue * scale}px;
  color: var(--highlight);
  text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
}

/* Song title styling */
#song {
  font-weight: bold;
  font-size: ${songSizeValue * scale}px;
  color: white;
  margin: 0;
  text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
}

p {
  white-space: nowrap;
}

/* Scrolling span */
#text-box span {
  display: inline-block;
  white-space: nowrap;
  will-change: transform;
  opacity: 0;
  transition: opacity 0.3s ease;
  transform: translateX(var(--marquee-start, 0));
}

/* Marquee animation */
.marquee {
  animation-name: marqueeAnim;
  animation-timing-function: linear;
  animation-iteration-count: infinite;
  animation-duration: var(--marquee-duration, 10s);
}

@keyframes marqueeAnim {
  0% {
    transform: translateX(var(--marquee-start, 0));
  }
  100% {
    transform: translateX(var(--marquee-end, 0));
  }
}

/* Progress bar container - dynamically positioned */
#progress-container {
  position: absolute;
  bottom: 0;
  left: ${(parseInt(imagePaddingValue) * scale + parseInt(imageSizeValue) * scale + 20)}px;
  width: ${(400 * scale) - (parseInt(imagePaddingValue) * scale + parseInt(imageSizeValue) * scale + 60)}px;
  margin-bottom: ${12 * scale}px;
  height: ${15 * scale}px;
  background-color: rgba(255, 255, 255, 0.1);
  overflow: hidden;
  border-radius: 10px 10px 10px 10px;
  z-index: 9999;
  transform: translateY(${progressBarOffsetValue * scale}px);
  filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.4));
}

#progress-bar {
  height: 100%;
  width: 0%;
  background-color: var(--highlight);
  transition: width 0.3s linear;
}

      `.trim();
    }

    function downloadCSS(filename, content) {
      const blob = new Blob([content], {type: "text/css"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => {
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 0);
    }

[artistSize, songSize, spacing, imageSizeSlider, contentPaddingSlider, imagePaddingSlider, frameOpacitySlider, frameBrightnessSlider, frameHue, textVerticalOffsetSlider, progressBarOffsetSlider].forEach((slider) => {
  slider.addEventListener("input", (e) => {
    if (e.target === artistSize) artistSizeValue = e.target.value;
    if (e.target === songSize) songSizeValue = e.target.value;
    if (e.target === spacing) spacingValue = e.target.value;
    if (e.target === imageSizeSlider) imageSizeValue = e.target.value;
    if (e.target === contentPaddingSlider) contentPaddingValue = e.target.value;
    if (e.target === imagePaddingSlider) imagePaddingValue = e.target.value;
    if (e.target === frameOpacitySlider) frameOpacityValue = e.target.value;
    if (e.target === frameBrightnessSlider) frameBrightnessValue = e.target.value;
    if (e.target === frameHue) frameHueValue = e.target.value;
    if (e.target === textVerticalOffsetSlider) textVerticalOffsetValue = e.target.value;
    if (e.target === progressBarOffsetSlider) progressBarOffsetValue = e.target.value;
    applyPreview();
  });
});

// Color picker event listener
accentColor.addEventListener("input", (e) => {
  accentColorValue = e.target.value;
  applyPreview();
});

// Font family event listener
fontFamily.addEventListener("change", (e) => {
  fontFamilyValue = e.target.value;
  applyPreview();
});

// Frame Hue event listener
frameHue.addEventListener("input", (e) => {
  frameHueValue = e.target.value;
  autoRotateHueValue = "no";
  autoRotateHue.value = "no";
  document.getElementById("autoRotateMessage").style.display = "none";
  frameHue.style.display = "block";
  frameHue.disabled = false;
  applyPreview();
});

// Auto Rotate Hue event listener
autoRotateHue.addEventListener("change", (e) => {
  autoRotateHueValue = e.target.value;
  
  if (autoRotateHueValue === "yes") {
    document.getElementById("autoRotateMessage").style.display = "block";
    frameHue.style.display = "none";
    frameHue.disabled = true;
    
    // Start auto-rotating hue
    let currentHue = 0;
    const hueRotationInterval = setInterval(() => {
      currentHue = (currentHue + 1) % 360;
      frameHueValue = currentHue;
      frameHue.value = currentHue;
      applyPreview();
    }, 30);
    
    // Store interval ID on the autoRotateHue element for cleanup
    autoRotateHue.hueRotationInterval = hueRotationInterval;
  } else {
    document.getElementById("autoRotateMessage").style.display = "none";
    frameHue.style.display = "block";
    frameHue.disabled = false;
    
    // Clear the hue rotation interval if it exists
    if (autoRotateHue.hueRotationInterval) {
      clearInterval(autoRotateHue.hueRotationInterval);
      autoRotateHue.hueRotationInterval = null;
    }
  }
});

    applyPreview();

    // Initialize header with F1-specific configuration
    initializeHeader({
      pageTitle: "Frame 10 - Color Bar Visualizer",
      onSave: () => {
        applyPreview();
        downloadCSS("01-NowPlaying-F10-Styles.css", generateCSS());
      }
    });

    /**
     * Initialize the header with custom configuration
     * @param {Object} config - Configuration object
     * @param {string} config.pageTitle - Title to display in the header
     * @param {Function} config.onSave - Callback function when Save button is clicked
     * @param {Function} config.onBack - Optional callback for Back button (defaults to history.back())
     * @param {boolean} config.showCopyUrl - Whether to show Copy URL button (default: true)
     */
    function initializeHeader(config = {}) {
      const {
        pageTitle = "Frame Editor",
        onSave = null,
        onBack = null,
        showCopyUrl = true
      } = config;

      // Set page title
      const pageTitleEl = document.getElementById("page-title");
      if (pageTitleEl) {
        pageTitleEl.textContent = pageTitle;
      }

      // Set up Save button callback
      const saveBtn = document.getElementById("save-btn");
      if (saveBtn && onSave) {
        saveBtn.addEventListener("click", onSave);
      }

      // Set up Back button callback if provided
      const backBtn = document.getElementById("back-btn");
      if (backBtn && onBack) {
        backBtn.onclick = onBack;
      }

      // Set up Copy Link button
      const copyUrlBtn = document.getElementById("copy-url-btn");
      if (copyUrlBtn) {
        if (!showCopyUrl) {
          copyUrlBtn.style.display = "none";
        } else {
          copyUrlBtn.addEventListener("click", () => {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
              // Visual feedback
              const originalText = copyUrlBtn.innerHTML;
              copyUrlBtn.innerHTML = '<span class="btn-icon">✓</span> Copied!';
              setTimeout(() => {
                copyUrlBtn.innerHTML = originalText;
              }, 2000);
            }).catch(err => {
              console.error("Failed to copy Link:", err);
              alert("Failed to copy Link to clipboard");
            });
          });
        }
      }
    }

  </script>

</body>
</html>
