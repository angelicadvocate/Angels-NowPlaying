<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EditorV2-Frame3</title>
  <link rel="stylesheet" href="../css/editor_pages/editor-header.css" />
  <link rel="stylesheet" href="../css/editor_pages/F3-Editor.css" />
  <link rel="stylesheet" href="../css/editor_pages/editor-common.css" />
</head>
<body>
    <!-- Header Module -->
    <!-- Dynamic header placeholder -->
    <div id="header-root" data-src="../editor_pages/editor-header.html" data-page-title="Frame 3 - Vertical Panel"></div>

  <main id="site">
    <!-- Column 1: Left Controls -->
    <section id="col-1">
      <div class="controls-column">
        <label for="fontFamily" class="info">Font Family</label>
        <select id="fontFamily" class="dropdown">
          <option value="proxima-nova, sans-serif" selected>Proxima Nova</option>
          <option value="Comic Sans MS, cursive">Comic Sans MS</option>
          <option value="Brush Script MT, cursive">Brush Script MT</option>
          <option value="Georgia, serif">Georgia</option>
          <option value="Times New Roman, serif">Times New Roman</option>
          <option value="Courier New, monospace">Courier New</option>
          <option value="Trebuchet MS, sans-serif">Trebuchet MS</option>
          <option value="Verdana, sans-serif">Verdana</option>
        </select>

        <label for="artist_name" class="info">Artist Name Size</label>
        <input type="range" min="8" max="30" value="19" class="slider" id="artist_name"> 

        <label for="track_title" class="info">Track Title Size</label>
        <input type="range" min="8" max="30" value="26" class="slider" id="track_title">  

        <label for="spacing" class="info">Text Vertical Spacing</label>
        <input type="range" min="-8" max="20" value="8" class="slider" id="spacing">  

        <label for="color" class="info">Accent Color</label>
        <div class="color-picker-container">
          <input type="color" id="color" class="color-picker" value="#3b82f6">
          <div id="colorDisplay" class="color-code-overlay"><code id="colorCode">#3B82F6</code></div>
        </div>

        <label for="trackColor" class="info">Track Title Color</label>
        <div class="color-picker-container">
          <input type="color" id="trackColor" class="color-picker" value="#FFFFFF">
          <div id="trackColorDisplay" class="color-code-overlay"><code id="trackColorCode">#FFFFFF</code></div>
        </div>
      </div>
    </section>

    <!-- Column 2: Right Controls -->
    <section id="col-2">
      <div class="controls-column">
        <label class="info" for="imageSize">Album Art Size</label>
        <input type="range" min="40" max="400" value="250" class="slider" id="imageSize">

        <label for="imageMarginTop" class="info">Image Top Margin</label>
        <input type="range" min="-140" max="100" value="10" class="slider" id="imageMarginTop">

        <label for="textMarginTop" class="info">Text Vertical Position</label>
        <input type="range" min="-100" max="100" value="-15" class="slider" id="textMarginTop">

        <label for="textAlignment" class="info">Text Alignment</label>
        <select id="textAlignment" class="dropdown">
          <option value="left">Left</option>
          <option value="center" selected>Center</option>
          <option value="right">Right</option>
        </select>

        <label for="imagePadding" class="info">Image Left Padding</label>
        <input type="range" min="-50" max="50" value="0" class="slider" id="imagePadding">
        
        <label for="imageBorderRadius" class="info">Album Art Border Radius (%)</label>
        <input type="range" min="0" max="50" value="6" class="slider" id="imageBorderRadius">

        
      </div>
    </section>

    <!-- Column 3: Preview -->
    <section id="col-3">
      <div id="sample">
        <div id="background">
          <div id="image-wrapper">
            <img id="image" src="../assets/SampleAlbum.png" alt="Album Art" />
          </div>
          <div id="content">
            <div id="text-box">
              <p id="artist">Sample Artist</p>
              <p id="song">Sample Song Title</p>
            </div>
          </div>
          <div id="progress-container-preview">
            <div id="progress-bar-preview"></div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <script>
    const artistSize = document.getElementById("artist_name");
    const songSize = document.getElementById("track_title");
    const spacing = document.getElementById("spacing");
    const color = document.getElementById("color");
    const trackColor = document.getElementById("trackColor");
    const textAlignment = document.getElementById("textAlignment");
    const fontFamily = document.getElementById("fontFamily");
    const artistEl = document.getElementById("artist");
    const songEl = document.getElementById("song");
    const image = document.getElementById('image');
    const imageSizeSlider = document.getElementById('imageSize');
    const imagePaddingSlider = document.getElementById('imagePadding');
    const imageMarginTopSlider = document.getElementById('imageMarginTop');
    
  const textMarginTopSlider = document.getElementById('textMarginTop');
  const imageBorderRadius = document.getElementById('imageBorderRadius');
  let textMarginTopValue = textMarginTopSlider.value;
    
    let imageMarginTopValue = imageMarginTopSlider.value;
  let imagePaddingValue = imagePaddingSlider.value;    
    let imageSizeValue = imageSizeSlider.value;
    let imageBorderRadiusValue = imageBorderRadius ? imageBorderRadius.value : 16;
    let artistSizeValue = artistSize.value;
    let songSizeValue = songSize.value;
    let spacingValue = spacing.value;
    let colorValue = color.value;
    let trackColorValue = trackColor ? trackColor.value : '#ffffff';
    let textAlignmentValue = textAlignment ? textAlignment.value : 'center';
    let fontFamilyValue = fontFamily.value;

    function hexToHsl(hex) {
      const r = parseInt(hex.slice(1,3),16)/255;
      const g = parseInt(hex.slice(3,5),16)/255;
      const b = parseInt(hex.slice(5,7),16)/255;
      const max = Math.max(r,g,b), min = Math.min(r,g,b);
      let h=0, s=0, l=(max+min)/2;
      if(max!==min){
        const d = max-min;
        s = l>0.5? d/(2-max-min) : d/(max+min);
        switch(max){
          case r: h = (g-b)/d + (g<b?6:0); break;
          case g: h = (b-r)/d + 2; break;
          case b: h = (r-g)/d + 4; break;
        }
        h = Math.round(h*60);
        s = Math.round(s*100);
        l = Math.round(l*100);
      } else { h = 0; s = 0; l = Math.round(l*100); }
      return [h,s,l];
    }

function applyPreview() {
  artistEl.style.fontSize = artistSizeValue + "px";
  songEl.style.fontSize = songSizeValue + "px";
  artistEl.style.marginBottom = spacingValue + "px";
  artistEl.style.color = colorValue;
  // track title has its own picker
  songEl.style.color = trackColorValue;
  // apply text alignment
  const textBoxEl = document.getElementById('text-box');
  if (textBoxEl) textBoxEl.style.textAlign = textAlignmentValue;
  document.getElementById("colorCode").textContent = (colorValue||'').toUpperCase();
  const trackCodeEl = document.getElementById("trackColorCode");
  if (trackCodeEl) trackCodeEl.textContent = (trackColorValue||'').toUpperCase();

  image.style.width = imageSizeValue + "px";
  image.style.height = imageSizeValue + "px";
  // apply border radius percent (0-50 makes circle at 50%)
  image.style.borderRadius = (imageBorderRadiusValue || 0) + "%";
  const content = document.getElementById('content');
  // editor preview centers text for F3; content padding control removed
  const imageWrapper = document.getElementById('image-wrapper');
  imageWrapper.style.marginLeft = imagePaddingValue + "px";
  imageWrapper.style.marginTop = imageMarginTopValue + "px";
  const textBox = document.getElementById('text-box');
  textBox.style.marginTop = textMarginTopValue + "px";
  
  // Update progress bar color (F3 uses static width based on default image size)
  const progressBar = document.getElementById('progress-bar-preview');
  if (progressBar) {
    // Update progress bar color to match accent color (use hex value)
    progressBar.style.backgroundColor = colorValue;
  }
}

// Font selector change handler
fontFamily.addEventListener('change', (e) => {
  fontFamilyValue = e.target.value;
  artistEl.style.fontFamily = fontFamilyValue;
  songEl.style.fontFamily = fontFamilyValue;
  applyPreview();
});


    function generateCSS() {
      // Map editor sliders to F3 runtime CSS variables and structure.
      return `
/* /static css placeholder/ */

:root {
  --highlight: hsl(${Math.min(360, Math.max(0, hexToHsl(colorValue)[0] || 221))}, 90%, 60%);
  --font-main: "proxima-nova", sans-serif;
  --f3-image-margin-left: ${imagePaddingValue};
  --f3-image-margin-bottom: ${8};
  --f3-content-padding-top: ${0};
  --f3-content-padding-side: ${0};
  --f3-text-margin-top: ${textMarginTopValue};
  --f3-text-margin-bottom: ${85};
  --f3-progress-bottom: ${85};
  --f3-text-margin-left: ${0};
  --f3-text-box-width: ${360};
  --f3-progress-scale: 0.9;
}

body {
  background: #ebebeb;
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: var(--font-main);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

#background {
  position: relative;
  width: 360px;
  min-width: 360px;
  max-width: 360px;
  height: 640px;
  background-image: url('../assets/Frame3.png');
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
  border-radius: 16px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 0;
  overflow: visible;
  z-index: 1;
}

#image {
  width: ${imageSizeValue * scale}px;
  height: ${imageSizeValue * scale}px;
  object-fit: cover;
  margin-top: ${76 * scale}px;
  margin-left: calc(var(--f3-image-margin-left) * 1px);
  margin-bottom: calc(var(--f3-image-margin-bottom) * 1px);
  padding-top: 0px;
  border-radius: ${imageBorderRadiusValue}%;
  display: block;
}

#content { width:100%; height:100%; box-sizing:border-box; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:calc(var(--f3-content-padding-top) * 1px) calc(var(--f3-content-padding-side) * 1px); overflow:hidden; }

#text-box { display:flex; flex-direction:column; justify-content:center; min-width:0; flex-grow:1; overflow:hidden; text-align:center; --scroll-extra:40px; --scroll-start-offset:40px; }

#text-box { margin-top: calc(var(--f3-text-margin-top) * 1px); margin-right:0; margin-left: calc(var(--f3-text-margin-left) * 1px); margin-bottom: calc(var(--f3-text-margin-bottom) * 1px); position:relative; z-index:10; width: calc(var(--f3-text-box-width) * 1px); box-sizing:border-box; display:block; }

#artist { text-transform: uppercase; font-weight: 600; font-size: ${artistSizeValue * scale}px; margin-bottom: ${spacingValue * scale}px; color: var(--highlight); }

#song { font-weight: bold; font-size: ${songSizeValue * scale}px; color: white; margin: 0; }

p { white-space: nowrap; }

#progress-container {
  width: ${250 * scale}px;
  height: ${8 * scale}px;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  bottom: ${30 * scale}px;
  background-color: rgba(255, 255, 255, 0.3);
  border-radius: ${4 * scale}px;
  overflow: hidden;
}

#progress-bar {
  height: 100%;
  background-color: var(--highlight);
  width: 0%;
  transition: width 0.3s ease;
  border-radius: ${4 * scale}px;
}

      `.trim();
    }

    function downloadCSS(filename, content) {
      const blob = new Blob([content], {type: "text/css"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => {
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 0);
    }

[artistSize, songSize, spacing, color, trackColor, imageSizeSlider, imagePaddingSlider, imageMarginTopSlider, textMarginTopSlider, imageBorderRadius].forEach((slider) => {
  slider.addEventListener("input", (e) => {
    if (e.target === artistSize) artistSizeValue = e.target.value;
    if (e.target === songSize) songSizeValue = e.target.value;
    if (e.target === spacing) spacingValue = e.target.value;
    if (e.target === color) colorValue = e.target.value;
    if (e.target === trackColor) trackColorValue = e.target.value;
  if (e.target === imageSizeSlider) imageSizeValue = e.target.value;
  if (e.target === imagePaddingSlider) imagePaddingValue = e.target.value;
    if (e.target === imageMarginTopSlider) imageMarginTopValue = e.target.value;
    if (e.target === textMarginTopSlider) textMarginTopValue = e.target.value;
    if (e.target === imageBorderRadius) imageBorderRadiusValue = e.target.value;
    applyPreview();
  });
});

// text alignment change handler
if (textAlignment) {
  textAlignment.addEventListener('change', (e) => {
    textAlignmentValue = e.target.value;
    applyPreview();
  });
}


    applyPreview();

    // Expose page-specific header callbacks for dynamic header
    window.onSave = function() {
      applyPreview();
      downloadCSS("03-NowPlaying-F3-Styles.css", generateCSS());
    };
    window.onBack = function() { history.back(); };
    window.onCopy = function() { navigator.clipboard.writeText(window.location.href).catch(()=>{}); };

  </script>

  <script src="../js/editor-header-loader.js"></script>
</body>
</html>
