name: Release

# Triggered by pushing a version tag, e.g. git tag v0.9.0 && git push --tags
on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    permissions:
      contents: write   # needed to create/update GitHub Releases

    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows — produces .msi and NSIS .exe installers
          - platform: windows-latest
            args: ''

          # Linux — produces .AppImage and .deb
          - platform: ubuntu-22.04
            args: ''

          # macOS universal binary — runs on both Apple Silicon and Intel
          - platform: macos-latest
            args: '--target universal-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal build needs both Apple Silicon and Intel targets
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing keys for the auto-updater. The private key + password are
          # stored in repo secrets; the matching public key is baked into
          # tauri.conf.json under plugins.updater.pubkey at build time.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Angels NowPlaying v__VERSION__'
          releaseBody: |
            See [CHANGELOG.md](https://github.com/angelicadvocate/Angels-NowPlaying/blob/main/CHANGELOG.md) for release notes.

            > **macOS note:** macOS builds are produced by CI but have not been hand-tested on real Apple hardware yet. Please report any issues.
          releaseDraft: true
          prerelease: false
          # Tells tauri-action to upload the updater JSON manifest alongside
          # the platform installers. The plugin in tauri.conf.json points at
          # /releases/latest/download/latest.json so the in-app updater can
          # always fetch the most recent published version.
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
